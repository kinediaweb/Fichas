<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinedia · Orden de trabajo</title>
  <style>
    :root{
      --bg:#ffffff;
      --paper:#ffffff;
      --ink:#17191b;
      --muted:#747b80;
      --line:#e3e7ea;
      --soft:#f7f8f9;
      --accent:#1f2326;
      --danger:#a42424;
      --ok:#326a42;
      --shadow:0 18px 50px rgba(20,28,34,.10);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#ffffff;
      color:var(--ink);
    }

    button,input,textarea{font:inherit}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }

    .sheet{
      position:relative;
      width:100%;
      min-height:1060px;
      background:var(--paper);
      border-radius:22px;
      box-shadow:none;
      padding:34px 56px 92px;
      overflow:hidden;
    }

    .view-shell{
      width:100%;
    }

    .view-switch{
      grid-column:1 / -1;
      width:100%;
      margin:0;
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:20;
    }

    .switch-inner{
      display:grid;
      grid-template-columns:1fr 1fr;
      width:100%;
      gap:0;
      padding:0;
      background:#fff;
      border:0;
      border-radius:0;
      box-shadow:none;
    }

    .view-tab{
      border:0;
      background:#fff;
      color:var(--muted);
      padding:15px 20px;
      border-radius:0;
      font-weight:600;
      font-size:14px;
      letter-spacing:.01em;
      cursor:pointer;
      border-bottom:2px solid transparent;
      transition:.18s ease;
    }

    .view-tab.active{
      background:#fff;
      color:var(--accent);
      border-bottom-color:var(--accent);
    }

    .view-panel{
      display:none;
    }

    .view-panel.active{
      display:block;
    }

    .saved-main{
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow);
      min-height:760px;
      overflow:hidden;
    }

    .saved-main .card{
      box-shadow:none;
      border-radius:0;
    }

    .sheet-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:18px;
    }

    .sheet-title{
      font-size:30px;
      font-weight:700;
      letter-spacing:.02em;
    }

    .brand{
      text-align:center;
      color:var(--accent);
    }

    .brand-mark{
      width:58px;
      height:58px;
      margin:0 auto 6px;
      border:5px solid var(--accent);
      border-right-color:transparent;
      border-radius:50%;
      position:relative;
    }

    .brand-mark::before{
      content:"K";
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-size:34px;
      font-weight:700;
    }

    .brand-name{
      font-size:14px;
      font-weight:700;
      letter-spacing:.18em;
    }

    .field-list{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .field-row{
      display:grid;
      grid-template-columns:155px 1fr;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border:1px solid transparent;
      border-radius:12px;
      transition:.18s ease;
    }

    .field-row:hover{
      background:#fff;
    }

    .field-row:focus-within{
      background:var(--soft);
      border-color:var(--line);
    }

    .field-label{
      font-size:14px;
      font-weight:650;
      letter-spacing:.01em;
      color:#30363a;
    }

    .field-input,
    .field-textarea{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:var(--ink);
      padding:0;
      font-size:16px;
      text-align:left;
    }

    .field-input::placeholder,
    .field-textarea::placeholder{
      color:#b0b6ba;
    }

    .field-textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.5;
    }

    .section-label{
      margin:24px 0 10px;
      font-size:13px;
      font-weight:500;
      letter-spacing:0;
      color:#000;
      text-transform:none;
    }



    .feet-image-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 0 10px;
      background:#fff;
      width:100%;
    }

    .feet-reference-image{
      display:block;
      width:100%;
      max-width:440px;
      height:auto;
      object-fit:contain;
      background:transparent;
      margin:0 auto;
    }

    .bottom-grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 10px;
    }

    .sheet-actions{
      position:absolute;
      left:40px;
      bottom:20px;
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
    }

    .date-corner{
      position:absolute;
      right:40px;
      bottom:24px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }

    .sidebar{
      position:sticky;
      top:28px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .card{
      background:#fff;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:18px 18px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .card-head h2{
      margin:0;
      font-size:17px;
      font-weight:700;
    }

    .card-body{
      padding:16px;
    }

    .search{
      width:100%;
      padding:12px 13px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--soft);
      outline:none;
    }

    .search:focus{
      border-color:#b8c0c5;
      background:#fff;
    }

    .record-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:none;
      overflow:auto;
      margin-top:14px;
    }

    .record{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
    }

    .record-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:5px;
    }

    .record-meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.55;
    }

    .record-actions{
      margin-top:10px;
      display:flex;
      gap:7px;
      flex-wrap:wrap;
    }


    .record-actions .btn-icon{
      flex:0 0 32px;
    }

    .empty{
      padding:28px 14px;
      color:var(--muted);
      text-align:center;
      border:1px dashed var(--line);
      border-radius:13px;
    }

    .btn{
      border:0;
      border-radius:8px;
      padding:7px 11px;
      font-weight:600;
      font-size:12px;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:hover{
      background:#f3f4f5;
      transform:none;
    }

    .btn-dark{
      background:#1f2326;
      color:#fff;
    }

    .btn-light{
      background:#fff;
      color:#4d5357;
      border:1px solid var(--line);
    }

    .btn-danger{
      background:#fbecec;
      color:var(--danger);
    }

    .btn-small{
      padding:6px 9px;
      font-size:12px;
    }

    .btn-icon{
      width:32px;
      height:32px;
      padding:0;
      display:inline-grid;
      place-items:center;
    }

    .btn-icon svg{
      width:16px;
      height:16px;
      fill:currentColor;
    }

    .btn-danger-soft{
      background:#fff;
      color:#8f2d2d;
      border:1px solid var(--line);
    }

    .btn-danger-soft:hover{
      background:#faf0f0;
      color:#7a1f1f;
    }

    .status{
      font-size:12px;
      color:var(--muted);
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:var(--ok);
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      transition:.2s;
      z-index:50;
    }

    .toast.show{
      opacity:1;
      transform:none;
    }

    @media(max-width:1180px){
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
    }

    @media(max-width:760px){
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
      .sheet{
        padding:32px 20px 68px;
        min-height:auto;
      }
      .sheet-header{
        margin-bottom:34px;
      }
      .sheet-title{
        font-size:24px;
      }
      .field-row{
        grid-template-columns:1fr;
        gap:6px;
      }
  
    .feet-image-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 0 10px;
      background:#fff;
      width:100%;
    }

    .feet-reference-image{
      display:block;
      width:100%;
      max-width:440px;
      height:auto;
      object-fit:contain;
      background:transparent;
      margin:0 auto;
    }

    .bottom-grid{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:560px){
      .brand-mark{
        width:48px;
        height:48px;
      }
      .brand-mark::before{
        font-size:28px;
      }
    }

    @media print{
      body{background:#fff}
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
      .sidebar,.sheet-actions,.view-switch{
      position:absolute;
      left:40px;
      bottom:20px;
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
    }
      .sheet{
        box-shadow:none;
        border-radius:0;
        width:210mm;
        min-height:297mm;
        padding:12mm 14mm 16mm;
      }
      .field-row,
      .foot-wrap{
        background:#fff!important;
        border-color:transparent!important;
      }
      .date-corner{
      position:absolute;
      right:40px;
      bottom:24px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="view-switch">
    <div class="switch-inner">
      <button type="button" class="view-tab active" data-view="formView">Fichas</button>
      <button type="button" class="view-tab" data-view="savedView">Guardados</button>
    </div>
  </div>

  <div class="view-shell view-panel active" id="formView">
  <form class="sheet" id="recordForm">
    <input type="hidden" id="recordId">
    <input type="hidden" id="date">

    <div class="sheet-header">
      <div class="sheet-title">Orden de trabajo</div>
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-name">KINEDIA</div>
      </div>
    </div>

    <div class="field-list">
      <div class="field-row">
        <label class="field-label" for="patient">Nombre del paciente</label>
        <input class="field-input" type="text" id="patient" placeholder="Nombre y apellido" required>
      </div>

      <div class="field-row">
        <label class="field-label" for="phone">Teléfono</label>
        <input class="field-input" type="tel" id="phone" placeholder="Teléfono">
      </div>

      <div class="field-row">
        <label class="field-label" for="dni">DNI</label>
        <input class="field-input" type="text" id="dni" placeholder="DNI">
      </div>

      <div class="field-row">
        <label class="field-label" for="last">Horma</label>
        <input class="field-input" type="text" id="last" placeholder="Horma">
      </div>

      <div class="field-row">
        <label class="field-label" for="material">Material</label>
        <input class="field-input" type="text" id="material" placeholder="Material">
      </div>

      <div class="field-row">
        <label class="field-label" for="number">N.º de orden</label>
        <input class="field-input" type="text" id="number" placeholder="Número">
      </div>
    </div>

        <label class="field-label" for="orderedBy">Pedido por</label>
        <input class="field-input" type="text" id="orderedBy" placeholder="Nombre">
      </div>

      <div class="field-row">
        <label class="field-label" for="madeBy">Confeccionado por</label>
        <input class="field-input" type="text" id="madeBy" placeholder="Nombre">
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-dark" type="submit">Guardar ficha</button>
      <button class="btn btn-light" type="button" id="pdfBtn">Exportar PDF</button>
      <button class="btn btn-light" type="button" id="printBtn">Imprimir</button>
      <button class="btn btn-icon btn-danger-soft" type="button" id="deleteCurrentBtn" aria-label="Borrar ficha actual" title="Borrar ficha actual">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-2 6h10l-.8 10.2A2 2 0 0 1 14.2 21H9.8a2 2 0 0 1-2-1.8L7 9Zm3 2v7h2v-7h-2Zm4 0v7h2v-7h-2Z"/>
        </svg>
      </button>
    </div>

    <div class="date-corner" id="dateCorner"></div>
  </form>
  </div>

  <div class="view-shell view-panel" id="savedView">
    <section class="saved-main">
      <section class="card">
        <div class="card-head">
          <h2>Fichas guardadas</h2>
          <span class="status" id="recordCount">0 registros</span>
        </div>
        <div class="card-body">
          <input class="search" id="searchInput" type="search" placeholder="Buscar paciente, DNI, teléfono, horma o material">
          <div class="record-list" id="recordList"></div>
        </div>
      </section>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const STORAGE_KEY = "kinedia_work_orders_v3";
  const $ = s => document.querySelector(s);
  const form = $("#recordForm");
  const list = $("#recordList");
  const search = $("#searchInput");
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  const fields = {
    id: $("#recordId"),
    date: $("#date"),
    patient: $("#patient"),
    phone: $("#phone"),
    dni: $("#dni"),
    last: $("#last"),
    material: $("#material"),
    number: $("#number"),
    observations: $("#observations"),
    orderedBy: $("#orderedBy"),
    madeBy: $("#madeBy")
  };

  function setToday() {
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
    const iso = local.toISOString().slice(0,10);
    fields.date.value = iso;
    $("#dateCorner").textContent = new Intl.DateTimeFormat("es-AR", {
      day:"2-digit",
      month:"2-digit",
      year:"numeric"
    }).format(now);
  }

  function showDate(iso) {
    if (!iso) return setToday();
    fields.date.value = iso;
    const [y,m,d] = iso.split("-");
    $("#dateCorner").textContent = `${d}/${m}/${y}`;
  }

  function saveStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function showToast(message, danger=false) {
    const el = $("#toast");
    el.textContent = message;
    el.style.background = danger ? "var(--danger)" : "var(--ok)";
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 1800);
  }

  function escapeHTML(value="") {
    return String(value).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    })[c]);
  }

  function formatDate(value) {
    if (!value) return "";
    const [y,m,d] = value.split("-");
    return `${d}/${m}/${y}`;
  }


  function resetForm() {
    form.reset();
    fields.id.value = "";
    setToday();
  }

  function recordFromForm() {
    return {
      id: fields.id.value || crypto.randomUUID(),
      date: fields.date.value,
      patient: fields.patient.value.trim(),
      phone: fields.phone.value.trim(),
      dni: fields.dni.value.trim(),
      last: fields.last.value.trim(),
      material: fields.material.value.trim(),
      number: fields.number.value.trim(),
      observations: fields.observations.value.trim(),
      orderedBy: fields.orderedBy.value.trim(),
      madeBy: fields.madeBy.value.trim(),
      updatedAt: new Date().toISOString()
    };
  }

  function renderRecords() {
    const q = search.value.trim().toLowerCase();
    const filtered = records
      .filter(r => [r.patient,r.phone,r.dni,r.last,r.material,r.number,r.observations]
        .some(v => String(v || "").toLowerCase().includes(q)))
      .sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));

    $("#recordCount").textContent = `${records.length} ${records.length === 1 ? "registro" : "registros"}`;

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">${records.length ? "No hay coincidencias." : "Todavía no hay fichas guardadas."}</div>`;
      return;
    }

    list.innerHTML = filtered.map(r => `
      <article class="record">
        <div class="record-title">${escapeHTML(r.patient)}</div>
        <div class="record-meta">
          ${formatDate(r.date)}
          ${r.phone ? ` · ${escapeHTML(r.phone)}` : ""}
          ${r.dni ? `<br>DNI ${escapeHTML(r.dni)}` : ""}
          ${r.last ? `<br>Horma: ${escapeHTML(r.last)}` : ""}
          ${r.number ? `<br>Orden N.º ${escapeHTML(r.number)}` : ""}
          ${r.material ? `<br>${escapeHTML(r.material)}` : ""}
        </div>
        <div class="record-actions">
          <button class="btn btn-light btn-small" data-action="edit" data-id="${r.id}">Editar</button>
          <button class="btn btn-light btn-small" data-action="pdf" data-id="${r.id}">Exportar PDF</button>
          <button class="btn btn-light btn-small" data-action="print" data-id="${r.id}">Imprimir</button>
          <button class="btn btn-icon btn-danger-soft btn-small" data-action="delete" data-id="${r.id}" aria-label="Eliminar ficha" title="Eliminar ficha">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-2 6h10l-.8 10.2A2 2 0 0 1 14.2 21H9.8a2 2 0 0 1-2-1.8L7 9Zm3 2v7h2v-7h-2Zm4 0v7h2v-7h-2Z"/>
            </svg>
          </button>
        </div>
      </article>
    `).join("");
  }

  function editRecord(id) {
    const r = records.find(x => x.id === id);
    if (!r) return;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";

    showDate(r.date);

    switchView("formView");
    window.scrollTo({top:0, behavior:"smooth"});
  }

  form.addEventListener("submit", e => {
    e.preventDefault();
    const record = recordFromForm();
    const idx = records.findIndex(r => r.id === record.id);

    if (idx >= 0) {
      records[idx] = record;
      showToast("Ficha actualizada");
    } else {
      records.push(record);
      showToast("Ficha guardada");
    }

    saveStorage();
    renderRecords();
    resetForm();
  });

  function loadRecordIntoForm(id) {
    const r = records.find(x => x.id === id);
    if (!r) return null;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";
    showDate(r.date);

    return r;
  }

  function printSavedRecord(id, exportAsPdf = false) {
    const record = loadRecordIntoForm(id);
    if (!record) return;

    switchView("formView");

    const previousTitle = document.title;
    if (exportAsPdf) {
      document.title = `Kinedia - ${record.patient || "ficha"}`;
    }

    setTimeout(() => {
      window.print();
      if (exportAsPdf) {
        setTimeout(() => {
          document.title = previousTitle;
        }, 500);
      }
    }, 120);
  }

  list.addEventListener("click", e => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;

    const {action,id} = btn.dataset;

    if (action === "edit") editRecord(id);
    if (action === "pdf") printSavedRecord(id, true);
    if (action === "print") printSavedRecord(id, false);

    if (action === "delete") {
      const r = records.find(x => x.id === id);
      if (confirm(`¿Eliminar la ficha de ${r?.patient || "este paciente"}?`)) {
        records = records.filter(x => x.id !== id);
        saveStorage();
        renderRecords();

        if (fields.id.value === id) resetForm();
        showToast("Ficha eliminada", true);
      }
    }
  });

  search.addEventListener("input", renderRecords);
$("#printBtn").addEventListener("click", () => window.print());

  $("#pdfBtn").addEventListener("click", () => {
    const previousTitle = document.title;
    const patientName = fields.patient.value.trim() || "ficha";
    document.title = `Kinedia - ${patientName}`;
    window.print();
    setTimeout(() => {
      document.title = previousTitle;
    }, 500);
  });

  $("#deleteCurrentBtn").addEventListener("click", () => {
    const currentId = fields.id.value;

    if (currentId) {
      const currentRecord = records.find(r => r.id === currentId);
      const patientName = currentRecord?.patient || fields.patient.value.trim() || "esta ficha";

      if (!confirm(`¿Borrar la ficha de ${patientName}?`)) return;

      records = records.filter(r => r.id !== currentId);
      saveStorage();
      renderRecords();
      resetForm();
      showToast("Ficha eliminada", true);
      return;
    }

    const hasContent = [
      fields.patient.value,
      fields.phone.value,
      fields.dni.value,
      fields.last.value,
      fields.material.value,
      fields.number.value,
      fields.observations.value,
      fields.orderedBy.value,
      fields.madeBy.value
    ].some(value => String(value || "").trim());

    if (!hasContent) {
      showToast("No hay una ficha para borrar", true);
      return;
    }

    if (confirm("¿Limpiar la ficha actual sin guardar?")) {
      resetForm();
      showToast("Ficha limpiada", true);
    }
  });

  function switchView(viewId) {
    document.querySelectorAll(".view-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === viewId);
    });
    document.querySelectorAll(".view-tab").forEach(tab => {
      tab.classList.toggle("active", tab.dataset.view === viewId);
    });
  }

  document.querySelectorAll(".view-tab").forEach(tab => {
    tab.addEventListener("click", () => switchView(tab.dataset.view));
  });

  resetForm();
  renderRecords();
})();
</script>
</body>
</html>
