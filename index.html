<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinedia · Orden de trabajo</title>
  <style>
    :root{
      --bg:#ffffff;
      --paper:#ffffff;
      --ink:#111111;
      --muted:#6f6f6f;
      --line:#dcdcdc;
      --soft:#f7f7f7;
      --accent:#111111;
      --danger:#8b2c2c;
      --ok:#325c42;
      --shadow:0 8px 24px rgba(0,0,0,.04);
      --radius:14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#ffffff;
      color:var(--ink);
    }

    button,input,textarea{font:inherit}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(0, 210mm);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }

    .sheet{
      position:relative;
      width:210mm;
      max-width:100%;
      min-height:297mm;
      aspect-ratio:210 / 297;
      margin:0 auto;
      background:var(--paper);
      border:1.5px solid #111;
      border-radius:0;
      box-shadow:var(--shadow);
      padding:10mm 10mm 12mm;
      overflow:hidden;
    }

    .view-shell{
      width:100%;
    }

    .view-switch{
      grid-column:1 / -1;
      width:100%;
      margin:0;
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:20;
    }

    .switch-inner{
      display:grid;
      grid-template-columns:1fr 1fr;
      width:100%;
      gap:0;
      padding:0;
      background:#fff;
      border:0;
      border-radius:0;
      box-shadow:none;
    }

    .view-tab{
      border:0;
      background:#fff;
      color:var(--muted);
      padding:15px 20px;
      border-radius:0;
      font-weight:600;
      font-size:14px;
      letter-spacing:.01em;
      cursor:pointer;
      border-bottom:2px solid transparent;
      transition:.18s ease;
    }

    .view-tab.active{
      background:#fff;
      color:#111;
      border-bottom-color:#111;
    }

    .view-panel{
      display:none;
    }

    .view-panel.active{
      display:block;
    }

    .saved-main{
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow);
      min-height:760px;
      overflow:hidden;
    }

    .saved-main .card{
      background:#fff;
      border-radius:14px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      overflow:hidden;
    }

    .sheet-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:18px;
      gap:12px;
    }

    .sheet-title{
      font-size:30px;
      font-weight:650;
      letter-spacing:.01em;
      color:#111;
    }

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      flex:0 0 auto;
      margin-left:auto;
      min-width:84px;
      min-height:84px;
    }

    .brand-mark{
      width:84px;
      height:84px;
      display:block;
      object-fit:contain;
      border-radius:50%;
      filter:none;
      opacity:1;
      visibility:visible;
    }

    .brand-name{
      display:none;
    }

    .field-list{
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows:repeat(3, auto);
      grid-auto-flow:row;
      column-gap:12px;
      row-gap:3px;
      width:100%;
    }

    .field-row{
      display:grid;
      grid-template-columns:132px minmax(0, 1fr);
      align-items:center;
      gap:6px;
      min-width:0;
      padding:6px 5px;
      border:1px solid transparent;
      border-radius:9px;
      transition:.18s ease;
    }

    .field-row:hover{
      background:var(--soft);
    }

    .field-row:focus-within{
      background:var(--soft);
      border-color:var(--line);
    }

    .field-list .field-row:first-child{
      grid-template-columns:132px minmax(145px, 1fr);
    }

    .field-label{
      min-width:0;
      font-size:13px;
      font-weight:650;
      letter-spacing:.005em;
      color:#30363a;
      white-space:nowrap;
    }

    .field-input,
    .field-textarea{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:var(--ink);
      padding:0;
      min-width:0;
      font-size:14px;
      text-align:left;
    }

    .field-input::placeholder,
    .field-textarea::placeholder{
      color:#b0b6ba;
    }

    .field-textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.5;
    }

    .section-label{
      margin:14px 0 8px;
      font-size:13px;
      font-weight:600;
      letter-spacing:0;
      color:#111;
      text-transform:none;
    }



    
    .feet-image-wrap{
      position:absolute;
      left:14mm;
      right:14mm;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      justify-content:center;
      align-items:center;
      width:auto;
      margin:0;
      background:#fff;
    }

    .feet-diagram{
      position:relative;
      width:100%;
      max-width:590px;
      aspect-ratio:510 / 335;
      margin:0 auto;
    }

    .feet-reference-image{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:transparent;
      margin:0 auto;
      position:relative;
      z-index:1;
    }

    .feet-layers{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:2;
    }

    .feet-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      opacity:0;
      transition:opacity .15s ease;
    }

    .feet-layer.visible{
      opacity:1;
    }

    .lower-layout-grid{
      position:absolute;
      left:14mm;
      right:14mm;
      bottom:10mm;
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
      align-items:start;
      gap:18px;
      margin:0;
    }

    .lower-left-column,
    .lower-right-column{
      min-width:0;
    }

    .lower-right-column .corrections-block{
      margin:0;
    }

    .lower-left-column .detail-block{
      margin:0;
    }

    .corrections-block,
    .detail-block{
      min-width:0;
      margin:0;
      padding:0;
      background:#fff;
    }

    .corrections-label{
      margin:0 0 8px;
      padding:0;
      font-size:14px;
      font-weight:650;
      letter-spacing:.01em;
      color:#30363a;
    }

    .detail-field-row{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:8px;
      padding:0;
      border:0;
      border-radius:0;
    }

    .detail-field-row:hover,
    .detail-field-row:focus-within{
      background:#fff;
      border-color:transparent;
    }

    .detail-textarea{
      min-height:132px;
      padding:10px 11px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      resize:vertical;
    }

    .detail-textarea:focus{
      border-color:#bfc6ca;
      background:#fff;
    }

    .multi-select{
      position:relative;
      width:100%;
    }

    .multi-trigger{
      width:100%;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--ink);
      cursor:pointer;
      text-align:left;
    }

    .multi-trigger:hover{
      background:var(--soft);
    }

    .multi-placeholder{
      color:#a5adb2;
      font-size:14px;
    }

    .multi-arrow{
      width:8px;
      height:8px;
      border-right:1.5px solid currentColor;
      border-bottom:1.5px solid currentColor;
      transform:rotate(45deg) translateY(-2px);
      flex:0 0 auto;
      color:var(--muted);
      transition:.18s ease;
    }

    .multi-select.open .multi-arrow{
      transform:rotate(225deg) translate(-1px,-1px);
    }

    .multi-menu{
      display:none;
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      z-index:30;
      max-height:340px;
      overflow:visible;
      padding:8px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      box-shadow:0 12px 28px rgba(0,0,0,.08);
    }

    .multi-select.open .multi-menu{
      display:block;
    }

    .correction-search{
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:9px 10px;
      outline:none;
      background:var(--soft);
      font-size:13px;
      margin-bottom:7px;
    }

    .correction-search:focus{
      background:#fff;
      border-color:#bfc6ca;
    }

    .correction-options{
      max-height:235px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .correction-option{
      width:100%;
      border:0;
      background:#fff;
      color:var(--ink);
      text-align:left;
      padding:9px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      line-height:1.25;
    }

    .correction-option:hover{
      background:var(--soft);
    }

    .foot-choice{
      display:none;
      margin-top:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--soft);
    }

    .foot-choice.open{
      display:block;
    }

    .foot-choice-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .foot-choice-name{
      color:var(--ink);
      font-weight:700;
    }

    .foot-choice-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
    }

    .foot-choice-btn{
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 10px;
      background:#fff;
      color:var(--ink);
      font-size:12px;
      font-weight:650;
      cursor:pointer;
    }

    .foot-choice-btn:hover{
      background:#f0f2f3;
    }

    .selected-corrections{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:4px;
      margin-top:10px;
    }

    .selected-correction{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      align-items:start;
      gap:8px;
      min-height:24px;
      padding:2px 0;
      border:0;
      border-radius:0;
      background:transparent;
      color:#34393d;
      font-size:13px;
      line-height:1.4;
    }

    .selected-correction-text{
      min-width:0;
      overflow-wrap:anywhere;
    }

    .selected-correction-text::before{
      content:"- ";
    }

    .correction-foot{
      color:var(--muted);
      font-weight:700;
    }

    .remove-correction{
      width:20px;
      height:20px;
      display:grid;
      place-items:center;
      border:0;
      border-radius:50%;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      padding:0;
      line-height:1;
      font-size:15px;
    }

    .remove-correction:hover{
      background:#e7e9eb;
      color:#222;
    }

    .corrections-print{
      display:none;
      font-size:13px;
      line-height:1.45;
      color:#222;
    }

    .multi-menu.choosing-foot .correction-search,
    .multi-menu.choosing-foot .correction-options{
      display:none;
    }

    .multi-menu.choosing-foot{
      max-height:none;
      overflow:visible;
    }

    .multi-menu.choosing-foot .foot-choice{
      display:block;
      margin-top:0;
    }

    .foot-choice-actions{
      grid-template-columns:1fr 1fr;
    }

    .foot-choice-cancel{
      grid-column:1 / -1;
      border:0;
      background:transparent;
      color:var(--muted);
      padding:7px;
      font-size:12px;
      cursor:pointer;
    }

    .foot-choice-cancel:hover{
      color:var(--ink);
    }

    .bottom-grid{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .made-date-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      align-items:center;
      gap:10px;
    }

    .made-date-row .field-row{
      min-width:0;
    }

    .date-corner{
      position:static;
      display:block;
      width:max-content;
      margin:6px 0 0;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }

    .form-actions-bar{
      width:210mm;
      max-width:100%;
      margin:12px auto 0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:7px;
      padding:8px;
      background:#fff;
      border:1px solid #e3e3e3;
      border-radius:12px;
      box-shadow:0 5px 18px rgba(0,0,0,.045);
    }

    .date-corner{
      position:static;
      justify-self:end;
      align-self:center;
      white-space:nowrap;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }

    .sidebar{
      position:sticky;
      top:28px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .card{
      background:#fff;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      background:#fff;
    }

    .card-head h2{
      margin:0;
      font-size:17px;
      font-weight:700;
    }

    .card-body{
      padding:14px;
    }

    .search{
      display:block;
      width:100%;
      min-width:0;
      min-height:41px;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      outline:none;
      font-size:13px;
    }

    .search:focus{
      border-color:#bdbdbd;
      background:#fff;
    }

    .record-list{
      display:flex;
      flex-direction:column;
      gap:7px;
      width:100%;
      max-height:none;
      overflow:visible;
      margin-top:10px;
    }

    .record{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      align-items:center;
      gap:14px;
      width:100%;
      min-width:0;
      padding:10px 11px;
      border:1px solid var(--line);
      border-radius:11px;
      background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.025);
      overflow:hidden;
    }

    .record-summary{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:0;
    }

    .record-title{
      margin:0;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:14px;
      font-weight:750;
      line-height:1.25;
      color:var(--ink);
    }

    .record-primary-meta{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:6px 16px;
      min-width:0;
      color:var(--muted);
      font-size:11px;
      line-height:1.35;
    }

    .record-primary-meta strong{
      color:#4b5054;
      font-weight:700;
    }

    .record-corrections{
      min-width:0;
      color:#4b5155;
      font-size:11px;
      line-height:1.4;
      overflow-wrap:anywhere;
    }

    .record-actions{
      display:grid;
      grid-template-columns:repeat(3, auto);
      align-items:center;
      justify-content:end;
      gap:4px;
      min-width:max-content;
      margin:0;
    }

    .record-actions .btn-small{
      min-width:0;
      padding:5px 7px;
      font-size:10px;
      white-space:nowrap;
    }

    .record-actions .btn-icon{
      width:28px;
      height:28px;
      padding:0;
    }

    .saved-tools{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 42px;
      align-items:start;
      width:100%;
      margin-bottom:10px;
    }

    .saved-search-wrap{
      grid-column:1;
      width:100%;
      min-width:0;
    }

    .saved-search-wrap .search{
      height:42px;
      min-height:42px;
      border-radius:10px 0 0 10px;
      border-right:0;
    }

    .filters-panel{
      display:contents;
    }

    .filters-accordion-btn{
      grid-column:2;
      width:42px;
      height:42px;
      min-height:42px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      border-radius:0 10px 10px 0;
      background:#fff;
      color:#111;
      padding:0;
      cursor:pointer;
      position:relative;
    }

    .filters-accordion-btn:hover{
      background:#f7f7f7;
    }

    .filter-funnel{
      position:relative;
      display:block;
      width:17px;
      height:16px;
    }

    .filter-funnel::before{
      content:"";
      position:absolute;
      left:1px;
      top:1px;
      width:15px;
      height:9px;
      background:#111;
      clip-path:polygon(0 0,100% 0,62% 100%,38% 100%);
    }

    .filter-funnel::after{
      content:"";
      position:absolute;
      left:6px;
      top:9px;
      width:5px;
      height:6px;
      background:#111;
      border-radius:0 0 1px 1px;
    }

    .filters-accordion-left,
    .filters-accordion-arrow{
      display:none;
    }

    .filters-accordion-meta{
      position:absolute;
      width:1px;
      height:1px;
      overflow:hidden;
      clip:rect(0 0 0 0);
      white-space:nowrap;
    }

    .filters-content{
      display:none;
      grid-column:1 / -1;
      width:100%;
      margin-top:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
    }

    .filters-panel.open .filters-content{
      display:block;
    }

    .filters-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin-top:10px;
    }

    .filter-field{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .filter-field label{
      font-size:10px;
      font-weight:700;
      color:var(--muted);
      letter-spacing:.03em;
    }

    .filter-input,
    .filter-select{
      width:100%;
      height:34px;
      padding:6px 8px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      color:var(--ink);
      outline:none;
      font-size:12px;
    }

    .filter-input:focus,
    .filter-select:focus{
      border-color:#b8c0c5;
    }

    .filter-actions{
      display:flex;
      justify-content:flex-end;
      align-items:end;
      gap:6px;
    }

    .filter-summary{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-size:11px;
      color:var(--muted);
    }

    .record-detail-short{
      overflow:hidden;
      text-overflow:ellipsis;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    @media(max-width:680px){
      .saved-tools{
        grid-template-columns:1fr;
      }

      .filters-grid{
        grid-template-columns:1fr 1fr;
      }

      .record{
        grid-template-columns:1fr;
        gap:5px;
      }

      .record-actions{
        justify-content:flex-start;
      }
    }

    @media(max-width:560px){
      .field-row,
      .field-list .field-row:first-child{
        grid-template-columns:1fr;
        gap:4px;
      }
      .filters-grid{
        grid-template-columns:1fr;
      }
    }

    .empty{
      padding:28px 14px;
      color:var(--muted);
      text-align:center;
      border:1px dashed var(--line);
      border-radius:13px;
    }

    .btn{
      border:1px solid var(--line);
      border-radius:8px;
      padding:7px 11px;
      font-weight:600;
      font-size:12px;
      cursor:pointer;
      transition:.18s ease;
      background:#fff;
      color:#111;
    }

    .btn:hover{
      background:#f4f4f4;
      transform:none;
    }

    .btn-dark{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-light{
      background:#fff;
      color:#111;
      border:1px solid var(--line);
    }

    .btn-danger{
      background:#fbecec;
      color:var(--danger);
    }

    .btn-small{
      padding:6px 9px;
      font-size:12px;
    }

    .btn-icon{
      width:32px;
      height:32px;
      padding:0;
      display:inline-grid;
      place-items:center;
    }

    .btn-icon svg{
      width:16px;
      height:16px;
      fill:currentColor;
    }

    .btn-danger-soft{
      background:#fff;
      color:#7e2b2b;
      border:1px solid var(--line);
    }

    .btn-danger-soft:hover{
      background:#faf1f1;
      color:#6a1d1d;
    }

    .status{
      font-size:12px;
      color:var(--muted);
    }

    .btn:disabled{
      opacity:.42;
      cursor:not-allowed;
      pointer-events:none;
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:var(--ok);
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      transition:.2s;
      z-index:50;
    }

    .toast.show{
      opacity:1;
      transform:none;
    }

    .sheet.capture-mode{
      box-sizing:border-box!important;
      width:210mm!important;
      max-width:none!important;
      height:297mm!important;
      min-height:297mm!important;
      max-height:297mm!important;
      aspect-ratio:auto!important;
      margin:0!important;
      padding:10mm 10mm 12mm!important;
      border:1.5px solid #111!important;
      border-radius:0!important;
      box-shadow:none!important;
      overflow:hidden!important;
      background:#fff!important;
    }

    .sheet.capture-mode .field-list{
      grid-template-columns:minmax(0,1fr) minmax(0,1fr)!important;
      grid-template-rows:repeat(3,auto)!important;
      column-gap:12px!important;
      row-gap:3px!important;
    }

    .sheet.capture-mode .field-row,
    .sheet.capture-mode .field-list .field-row:first-child{
      grid-template-columns:132px minmax(0,1fr)!important;
      gap:6px!important;
      padding:6px 5px!important;
    }

    .sheet.capture-mode .lower-layout-grid{
      position:absolute!important;
      left:14mm!important;
      right:14mm!important;
      bottom:10mm!important;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr)!important;
      gap:18px!important;
      margin:0!important;
    }

    .sheet.capture-mode .made-date-row{
      grid-template-columns:minmax(0,1fr) auto!important;
      gap:10px!important;
    }

    .sheet.capture-mode .remove-correction,
    .sheet.capture-mode .multi-menu{
      display:none!important;
    }

    .sheet.capture-mode input,
    .sheet.capture-mode textarea{
      caret-color:transparent!important;
    }

    @media(max-width:1180px){
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(0, 210mm);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
    }

    @media(max-width:760px){
      .record{
        grid-template-columns:1fr;
        gap:9px;
      }

      .record-actions{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        width:100%;
        min-width:0;
      }

      .record-actions .btn-small,
      .record-actions .btn-icon{
        width:100%;
        min-width:0;
      }

      .saved-tools{
        grid-template-columns:minmax(0, 1fr) 42px;
      }

      .lower-layout-grid{
        position:static;
        grid-template-columns:1fr;
        gap:14px;
        margin-top:14px;
      }

      .made-date-row{
        grid-template-columns:1fr;
        gap:6px;
      }

      .date-corner{
        position:static;
        display:block;
        width:max-content;
        margin:6px 0 0;
        font-size:12px;
        color:var(--muted);
        letter-spacing:.04em;
        text-transform:none;
        line-height:1;
      }

      .app{padding:0 10px 10px}
      .sheet{
        padding:32px 20px 92px;
      }
      .sheet-header{
        margin-bottom:18px;
      }
      .sheet-title{
        font-size:24px;
      }
      .brand-mark{
        width:68px;
        height:68px;
      }
      .feet-diagram,
      .feet-reference-image{
        max-width:500px;
      }
      .annotation-text{
        font-size:13px;
      }
      .field-list{
        grid-template-columns:1fr;
        grid-template-rows:none;
        column-gap:0;
        row-gap:2px;
      }

      .field-row{
        grid-template-columns:132px minmax(0, 1fr);
        gap:6px;
      }
      .bottom-grid{
        grid-template-columns:1fr;
      }
.form-actions-bar{
        width:100%;
        margin-top:9px;
        justify-content:center;
        flex-wrap:wrap;
        gap:6px;
      }
      .date-corner{
        right:20px;
        bottom:22px;
      }
      .view-tab{
        padding:13px 12px;
      }
    }

    @media(max-width:560px){
      .brand-mark{
        width:48px;
        height:48px;
      }
      .brand-mark::before{
        font-size:28px;
      }
    }

    @page{
      size:A4 portrait;
      margin:0;
    }

    @media print{
      html,
      body{
        width:210mm;
        height:297mm;
        margin:0;
        padding:0;
        background:#fff;
      }

      .view-switch,
      .form-actions-bar,
      .sidebar,
      #savedView{
        display:none!important;
      }

      .app{
        display:block;
        width:210mm;
        min-height:297mm;
        margin:0;
        padding:0;
        background:#fff;
      }

      .view-shell,
      #formView{
        display:block!important;
        width:210mm;
        margin:0;
        padding:0;
      }

      .sheet{
        box-sizing:border-box;
        width:210mm;
        height:297mm;
        min-height:297mm;
        max-height:297mm;
        aspect-ratio:auto;
        margin:0;
        padding:10mm 10mm 11mm;
        border:1.2px solid #111;
        border-radius:0;
        box-shadow:none;
        overflow:hidden;
      }

      .field-list{
        grid-template-columns:1fr 1fr;
        grid-template-rows:repeat(3, auto);
        column-gap:12px;
        row-gap:2px;
      }

      .field-row{
        grid-template-columns:35mm minmax(0, 1fr);
        gap:1.5mm;
        padding:1.3mm 1.5mm;
        background:#fff!important;
        border-color:transparent!important;
      }

      .lower-layout-grid{
        position:absolute;
        left:14mm;
        right:14mm;
        bottom:10mm;
        grid-template-columns:1fr 1fr;
        gap:12px;
        margin:0;
      }

      .made-date-row{
        grid-template-columns:minmax(0,1fr) auto;
        gap:8px;
      }

      .date-corner{
        position:static;
      }

      .remove-correction{
        display:none!important;
      }

      .foot-wrap{
        background:#fff!important;
        border-color:transparent!important;
      }

      .date-corner{
        position:static;
        font-size:12px;
        color:var(--muted);
        letter-spacing:.04em;
        text-transform:none;
        line-height:1;
      }
    }
  </style>
</head>

  function setToday() {
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
    const iso = local.toISOString().slice(0,10);
    fields.date.value = iso;
    $("#dateCorner").textContent = new Intl.DateTimeFormat("es-AR", {
      day:"2-digit",
      month:"2-digit",
      year:"numeric"
    }).format(now);
  }

  function showDate(iso) {
    if (!iso) return setToday();
    fields.date.value = iso;
    const [y,m,d] = iso.split("-");
    $("#dateCorner").textContent = `${d}/${m}/${y}`;
  }

  async function saveRecordToFirestore(record) {
    await setDoc(doc(db, "fichas", record.id), record);
  }

  async function deleteRecordFromFirestore(id) {
    await deleteDoc(doc(db, "fichas", id));
  }

  async function migrateLegacyRecords() {
    const migrationKey = `${LEGACY_STORAGE_KEY}_migrated_to_firestore`;

    if (localStorage.getItem(migrationKey) === "true") return;

    let legacyRecords = [];

    try {
      legacyRecords = JSON.parse(localStorage.getItem(LEGACY_STORAGE_KEY) || "[]");
    } catch (error) {
      console.warn("No se pudieron leer las fichas anteriores:", error);
    }

    if (!Array.isArray(legacyRecords) || !legacyRecords.length) {
      localStorage.setItem(migrationKey, "true");
      return;
    }

    await Promise.all(
      legacyRecords
        .filter(record => record && record.id)
        .map(record =>
          setDoc(doc(db, "fichas", record.id), {
            ...record,
            updatedAt: record.updatedAt || new Date().toISOString()
          })
        )
    );

    localStorage.setItem(migrationKey, "true");
    showToast("Fichas anteriores migradas a Firebase");
  }

  function listenToFirestore() {
    return onSnapshot(
      recordsCollection,
      snapshot => {
        records = snapshot.docs.map(snapshotDoc => ({
          id: snapshotDoc.id,
          ...snapshotDoc.data()
        }));

        firestoreReady = true;
        renderRecords();
      },
      error => {
        console.error("Error al leer Firestore:", error);
        firestoreReady = false;
        showToast("No se pudo conectar con la base de datos", true);
        renderRecords();
      }
    );
  }

  function showToast(message, danger=false) {
    const el = $("#toast");
    el.textContent = message;
    el.style.background = danger ? "var(--danger)" : "var(--ok)";
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 1800);
  }

    })[c]);

  function getCorrectionLayerKey(item) {
    const base = CORRECTION_LAYER_MAP[item.name];
    if (!base) return "";
    const side = item.foot === "Derecho" ? "der" : "izq";
    return `${base}_${side}`;
  }

  function renderFootAnnotations() {
    if (!feetLayers) return;

    const normalized = normalizeCorrections(selectedCorrections);
    const uniqueKeys = [...new Set(
      normalized
        .map(getCorrectionLayerKey)
        .filter(key => key && FEET_LAYER_IMAGES[key])
    )];

    feetLayers.innerHTML = uniqueKeys.map(key => `
      <img
        src="${FEET_LAYER_IMAGES[key]}"
        alt=""
        class="feet-layer visible"
        data-layer-key="${key}"
      >
    `).join("");
  }

  function renderCorrections() {
    correctionsPlaceholder.textContent = selectedCorrections.length
      ? `${selectedCorrections.length} seleccionada${selectedCorrections.length === 1 ? "" : "s"}`
      : "Buscar y seleccionar correcciones";

    selectedCorrectionsEl.innerHTML = selectedCorrections.map((item, index) => `
      <div class="selected-correction">
        <span class="selected-correction-text">
          ${escapeHTML(item.name)}
          <span class="correction-foot">(${item.foot === "Izquierdo" ? "Izq." : "Der."})</span>
        </span>
        <button
          type="button"
          class="remove-correction"
          data-remove-correction-index="${index}"
          aria-label="Quitar ${escapeHTML(item.name)}"
          title="Quitar corrección"
        >×</button>
      </div>
    `).join("");

    correctionsPrint.innerHTML = selectedCorrections.length
      ? selectedCorrections.map(item =>
          `- ${escapeHTML(item.name)} (${item.foot === "Izquierdo" ? "Izq." : "Der."})`
        ).join("<br>")
      : "Sin correcciones seleccionadas";

    renderFootAnnotations();

  }

  function filterCorrectionOptions() {
    const query = correctionSearch.value.trim().toLowerCase();

    correctionOptions.querySelectorAll(".correction-option").forEach(button => {
      const matches = button.dataset.correction.toLowerCase().includes(query);
      button.style.display = matches ? "" : "none";
    });
  }

  function openFootChoice(correctionName) {
    pendingCorrection = correctionName;
    footChoiceName.textContent = correctionName;
    footChoice.classList.add("open");
    correctionsMenu.classList.add("choosing-foot");
  }

  correctionsTrigger.addEventListener("click", () => {
    correctionsSelect.classList.toggle("open");

    if (correctionsSelect.classList.contains("open")) {
      correctionSearch.value = "";
      filterCorrectionOptions();
      footChoice.classList.remove("open");
      correctionsMenu.classList.remove("choosing-foot");
      pendingCorrection = "";
      setTimeout(() => correctionSearch.focus(), 50);
    }
  });

  correctionSearch.addEventListener("input", filterCorrectionOptions);

  correctionOptions.addEventListener("click", e => {
    const button = e.target.closest("[data-correction]");
    if (!button) return;
    openFootChoice(button.dataset.correction);
  });

  footChoice.addEventListener("click", e => {
    const button = e.target.closest("[data-foot-choice]");
    if (!button || !pendingCorrection) return;

    const foot = button.dataset.footChoice;

    const alreadyExists = selectedCorrections.some(item =>
      item.name === pendingCorrection && item.foot === foot
    );

    if (!alreadyExists) {
      selectedCorrections.push({
        name: pendingCorrection,
        foot
      });
    }

    renderCorrections();
    footChoice.classList.remove("open");
    correctionsMenu.classList.remove("choosing-foot");
    pendingCorrection = "";
    correctionSearch.value = "";
    filterCorrectionOptions();
    correctionSearch.focus();
  });


  footChoiceCancel.addEventListener("click", () => {
    footChoice.classList.remove("open");
    correctionsMenu.classList.remove("choosing-foot");
    pendingCorrection = "";
    correctionSearch.value = "";
    filterCorrectionOptions();
    correctionSearch.focus();
  });

  selectedCorrectionsEl.addEventListener("click", e => {
    const btn = e.target.closest("[data-remove-correction-index]");
    if (!btn) return;

    const index = Number(btn.dataset.removeCorrectionIndex);
    selectedCorrections.splice(index, 1);
    renderCorrections();
  });

  document.addEventListener("click", e => {
    if (!correctionsSelect.contains(e.target)) {
      correctionsSelect.classList.remove("open");
      correctionsMenu.classList.remove("choosing-foot");
      footChoice.classList.remove("open");
      pendingCorrection = "";
    }
  });

  function resetForm() {
    form.reset();
    fields.id.value = "";
    editingRecordId = "";
    selectedCorrections = [];
    renderCorrections();
    setToday();
    updateDeleteCurrentState();
  }

  function recordFromForm() {
    return {
      id: fields.id.value || crypto.randomUUID(),
      date: fields.date.value,
      patient: fields.patient.value.trim(),
      phone: fields.phone.value.trim(),
      dni: fields.dni.value.trim(),
      last: fields.last.value.trim(),
      material: fields.material.value.trim(),
      number: fields.number.value.trim(),
      observations: fields.observations.value.trim(),
      corrections: [...selectedCorrections],
      orderedBy: fields.orderedBy.value.trim(),
      madeBy: fields.madeBy.value.trim(),
      updatedAt: new Date().toISOString()
    };
  }


  function updateFiltersAccordionMeta() {
    const activeFilters = [];

    if (search.value.trim()) activeFilters.push("búsqueda");
    if (filterDate.value) activeFilters.push("fecha");
    if (filterFrom.value || filterTo.value) activeFilters.push("período");
    if (filterCorrection.value) activeFilters.push("corrección");
    if (filterFoot.value) activeFilters.push("pie");
    if (filterDetail.value.trim()) activeFilters.push("detalle");
    if (filterPatient.value.trim()) activeFilters.push("paciente");
    if (filterDni.value.trim()) activeFilters.push("DNI");

    filtersAccordionMeta.textContent = activeFilters.length
      ? `${activeFilters.length} filtro${activeFilters.length === 1 ? "" : "s"} activo${activeFilters.length === 1 ? "" : "s"}`
      : "Sin filtros activos";
  }

  function recordMatchesFilters(r) {
    const q = search.value.trim().toLowerCase();
    const exactDate = filterDate.value;
    const fromDate = filterFrom.value;
    const toDate = filterTo.value;
    const correction = filterCorrection.value;
    const foot = filterFoot.value;
    const detail = filterDetail.value.trim().toLowerCase();
    const patient = filterPatient.value.trim().toLowerCase();
    const dni = filterDni.value.trim().toLowerCase();

    const normalizedCorrections = normalizeCorrections(r.corrections);

    const generalValues = [
      r.patient,
      r.phone,
      r.dni,
      r.last,
      r.material,
      r.number,
      r.observations,
      r.orderedBy,
      r.madeBy,
      ...normalizedCorrections.flatMap(item => [item.name, item.foot])
    ].map(v => String(v || "").toLowerCase());

    if (q && !generalValues.some(value => value.includes(q))) return false;
    if (exactDate && r.date !== exactDate) return false;
    if (fromDate && (!r.date || r.date < fromDate)) return false;
    if (toDate && (!r.date || r.date > toDate)) return false;
    if (detail && !String(r.observations || "").toLowerCase().includes(detail)) return false;
    if (patient && !String(r.patient || "").toLowerCase().includes(patient)) return false;
    if (dni && !String(r.dni || "").toLowerCase().includes(dni)) return false;

    if (correction || foot) {
      const correctionMatch = normalizedCorrections.some(item => {
        const matchesCorrection = !correction || item.name === correction;
        const matchesFoot = !foot || item.foot === foot;
        return matchesCorrection && matchesFoot;
      });
      if (!correctionMatch) return false;
    }

    return true;
  }

  function renderRecords() {
    const filtered = records
      .filter(recordMatchesFilters)
      .sort((a,b) => {
        const dateCompare = String(b.date || "").localeCompare(String(a.date || ""));
        if (dateCompare !== 0) return dateCompare;
        return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
      });

    $("#recordCount").textContent = firestoreReady
      ? `${records.length} ${records.length === 1 ? "registro" : "registros"} · Firebase`
      : "Conectando con Firebase...";
    filteredCount.textContent = `${filtered.length} ${filtered.length === 1 ? "resultado" : "resultados"}`;
    updateFiltersAccordionMeta();

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">${records.length ? "No hay fichas que coincidan con los filtros." : "Todavía no hay fichas guardadas."}</div>`;
      return;
    }

    list.innerHTML = filtered.map(r => {
      const corrections = normalizeCorrections(r.corrections);
      const correctionText = corrections.length
        ? corrections
            .map(item => `${item.name} (${item.foot === "Izquierdo" ? "Izq." : "Der."})`)
            .join(" · ")
        : "Sin correcciones";

      return `
        <article class="record">
          <div class="record-summary">
            <div class="record-title">${escapeHTML(r.patient || "Sin nombre")}</div>

            <div class="record-primary-meta">
              <span><strong>DNI</strong> ${escapeHTML(r.dni || "—")}</span>
              <span><strong>Fecha</strong> ${escapeHTML(formatDate(r.date) || "—")}</span>
            </div>

            <div class="record-corrections">${escapeHTML(correctionText)}</div>
          </div>

          <div class="record-actions">
            <button type="button" class="btn btn-light btn-small" data-action="edit" data-id="${r.id}">Editar</button>
            <button type="button" class="btn btn-light btn-small" data-action="pdf" data-id="${r.id}">PDF</button>
            <button type="button" class="btn btn-light btn-small" data-action="png" data-id="${r.id}">PNG</button>
            <button type="button" class="btn btn-light btn-small" data-action="jpg" data-id="${r.id}">JPG</button>
            <button type="button" class="btn btn-light btn-small" data-action="print" data-id="${r.id}">Imprimir</button>
            <button type="button" class="btn btn-icon btn-danger-soft btn-small" data-action="delete" data-id="${r.id}" aria-label="Eliminar ficha" title="Eliminar ficha">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-2 6h10l-.8 10.2A2 2 0 0 1 14.2 21H9.8a2 2 0 0 1-2-1.8L7 9Zm3 2v7h2v-7h-2Zm4 0v7h2v-7h-2Z"/>
              </svg>
            </button>
          </div>
        </article>
      `;
    }).join("");
  }

  function updateDeleteCurrentState() {
    const deleteButton = $("#deleteCurrentBtn");
    if (!deleteButton) return;

    const blocked = Boolean(editingRecordId);
    deleteButton.disabled = blocked;
    deleteButton.setAttribute("aria-disabled", blocked ? "true" : "false");
    deleteButton.title = blocked
      ? "Guardá nuevamente la ficha antes de eliminarla"
      : "Borrar ficha actual";
  }

  function editRecord(id) {
    const r = records.find(x => x.id === id);
    if (!r) return;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";
    selectedCorrections = normalizeCorrections(r.corrections);
    renderCorrections();

    showDate(r.date);
    editingRecordId = r.id;
    updateDeleteCurrentState();

    switchView("formView");
    window.scrollTo({top:0, behavior:"smooth"});
  }

  form.addEventListener("submit", async e => {
    e.preventDefault();

    const record = recordFromForm();
    const alreadyExists = records.some(item => item.id === record.id);
    const submitButton = $("#saveRecordBtn");

    submitButton.disabled = true;
    submitButton.textContent = alreadyExists ? "Actualizando..." : "Guardando...";

    try {
      await saveRecordToFirestore(record);
      showToast(alreadyExists ? "Ficha actualizada" : "Ficha guardada");
      resetForm();
    } catch (error) {
      console.error("Error al guardar la ficha:", error);
      showToast("No se pudo guardar la ficha", true);
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = "Guardar ficha";
    }
  });

  function loadRecordIntoForm(id) {
    const r = records.find(x => x.id === id);
    if (!r) return null;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";
    selectedCorrections = normalizeCorrections(r.corrections);
    renderCorrections();
    showDate(r.date);

    return r;
  }

  function safeFileName(value) {
    return String(value || "ficha")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[<>:"/\\|?*\x00-\x1F]/g, "")
      .replace(/\s+/g, "_")
      .replace(/_+/g, "_")
      .replace(/^_|_$/g, "")
      .slice(0, 80) || "ficha";
  }

  function getCurrentFileName(extension) {
    const patient = safeFileName(fields.patient.value.trim() || "ficha");
    const order = safeFileName(fields.number.value.trim());
    const suffix = order && order !== "ficha" ? `_orden_${order}` : "";
    return `Kinedia_${patient}${suffix}.${extension}`;
  }

  async function waitForSheetImages() {
    const images = [...form.querySelectorAll("img")];

    await Promise.all(images.map(image => {
      if (image.complete && image.naturalWidth > 0) return Promise.resolve();

      return new Promise(resolve => {
        const finish = () => resolve();
        image.addEventListener("load", finish, { once:true });
        image.addEventListener("error", finish, { once:true });
      });
    }));
  }

  function copyFormValuesToClone(clonedSheet) {
    const originalControls = [...form.querySelectorAll("input, textarea, select")];
    const clonedControls = [...clonedSheet.querySelectorAll("input, textarea, select")];

    originalControls.forEach((original, index) => {
      const clone = clonedControls[index];
      if (!clone) return;

      if (original instanceof HTMLInputElement) {
        clone.value = original.value;
        clone.setAttribute("value", original.value);
        clone.checked = original.checked;
      } else if (original instanceof HTMLTextAreaElement) {
        clone.value = original.value;
        clone.textContent = original.value;
      } else if (original instanceof HTMLSelectElement) {
        clone.value = original.value;
      }
    });
  }

  async function captureCurrentSheet() {
    if (!window.html2canvas) {
      throw new Error("No se pudo cargar el sistema de exportación.");
    }

    correctionsSelect.classList.remove("open");
    correctionsMenu.classList.remove("choosing-foot");
    footChoice.classList.remove("open");

    if (document.activeElement instanceof HTMLElement) {
      document.activeElement.blur();
    }

    if (document.fonts?.ready) {
      await document.fonts.ready;
    }

    await waitForSheetImages();

    return window.html2canvas(form, {
      scale:3,
      backgroundColor:"#ffffff",
      useCORS:true,
      allowTaint:false,
      logging:false,
      imageTimeout:15000,
      scrollX:0,
      scrollY:-window.scrollY,
      onclone: clonedDocument => {
        const clonedSheet = clonedDocument.querySelector("#recordForm");
        if (!clonedSheet) return;

        clonedDocument.documentElement.style.background = "#ffffff";
        clonedDocument.body.style.margin = "0";
        clonedDocument.body.style.background = "#ffffff";

        clonedSheet.classList.add("capture-mode");
        copyFormValuesToClone(clonedSheet);

        clonedDocument.querySelector("#correctionsSelect")?.classList.remove("open");
        clonedDocument.querySelector("#correctionsMenu")?.classList.remove("choosing-foot");
      }
    });
  }

  function canvasToBlob(canvas, type, quality) {
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error("No se pudo crear el archivo."));
      }, type, quality);
    });
  }

  function downloadBlob(blob, fileName) {
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");

    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }

  async function exportCurrentImage(format) {
    const canvas = await captureCurrentSheet();
    const isJpg = format === "jpg";
    const mimeType = isJpg ? "image/jpeg" : "image/png";
    const quality = isJpg ? 0.96 : 1;
    const blob = await canvasToBlob(canvas, mimeType, quality);

    downloadBlob(blob, getCurrentFileName(format));
  }

  async function exportCurrentPdf() {
    if (!window.jspdf?.jsPDF) {
      throw new Error("No se pudo cargar el sistema de PDF.");
    }

    const canvas = await captureCurrentSheet();
    const imageData = canvas.toDataURL("image/jpeg", 0.97);
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
      orientation:"portrait",
      unit:"mm",
      format:"a4",
      compress:true
    });

    pdf.addImage(imageData, "JPEG", 0, 0, 210, 297, undefined, "FAST");
    pdf.save(getCurrentFileName("pdf"));
  }

  async function printCurrentSheet() {
    const canvas = await captureCurrentSheet();
    const imageData = canvas.toDataURL("image/png");

    const printFrame = document.createElement("iframe");
    printFrame.setAttribute("aria-hidden", "true");
    printFrame.style.position = "fixed";
    printFrame.style.right = "0";
    printFrame.style.bottom = "0";
    printFrame.style.width = "0";
    printFrame.style.height = "0";
    printFrame.style.border = "0";
    printFrame.style.visibility = "hidden";

    document.body.appendChild(printFrame);

    const frameWindow = printFrame.contentWindow;
    const frameDocument = printFrame.contentDocument || frameWindow.document;

    const removeFrame = () => {
      setTimeout(() => {
        printFrame.remove();
      }, 250);
    };

    frameDocument.open();
    frameDocument.write(`
      <!DOCTYPE html>
      <html lang="es">
      <head>
        <meta charset="UTF-8">
        <title>Kinedia - ${escapeHTML(fields.patient.value.trim() || "ficha")}</title>
        <style>
          @page{
            size:A4 portrait;
            margin:0;
          }

          html,
          body{
            width:210mm;
            height:297mm;
            margin:0;
            padding:0;
            background:#fff;
            overflow:hidden;
          }

          body{
            display:flex;
            align-items:flex-start;
            justify-content:flex-start;
          }

          img{
            display:block;
            width:210mm;
            height:297mm;
            object-fit:fill;
            margin:0;
          }
        </style>
      </head>
      <body>
        <img id="printImage" src="${imageData}" alt="Ficha Kinedia">
      </body>
      </html>
    `);
    frameDocument.close();

    const printImage = frameDocument.getElementById("printImage");

    await new Promise((resolve, reject) => {
      if (printImage.complete) {
        resolve();
        return;
      }

      printImage.addEventListener("load", resolve, { once:true });
      printImage.addEventListener(
        "error",
        () => reject(new Error("No se pudo preparar la ficha para imprimir.")),
        { once:true }
      );
    });

    frameWindow.addEventListener("afterprint", removeFrame, { once:true });

    setTimeout(() => {
      try {
        frameWindow.focus();
        frameWindow.print();
      } catch (error) {
        removeFrame();
        throw error;
      }
    }, 100);
  }

  async function exportSavedRecord(id, format) {
    const record = loadRecordIntoForm(id);
    if (!record) return;

    switchView("formView");
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

    if (format === "print") {
      await printCurrentSheet();
    } else if (format === "pdf") {
      await exportCurrentPdf();
    } else {
      await exportCurrentImage(format);
    }
  }


  async function deleteSavedRecord(id) {
    if (editingRecordId === id) {
      showToast("Guardá nuevamente la ficha antes de poder eliminarla.", true);
      return;
    }

    const record = records.find(item => item.id === id);

    if (!record) {
      showToast("No se encontró la ficha", true);
      return;
    }

    const patientName = record.patient || "este paciente";
    const confirmed = window.confirm(`¿Eliminar la ficha de ${patientName}?`);

    if (!confirmed) return;

    try {
      await deleteRecordFromFirestore(id);

      if (fields.id.value === id) {
        resetForm();
      }

      showToast("Ficha eliminada", true);
    } catch (error) {
      console.error("Error al eliminar la ficha:", error);
      showToast("No se pudo eliminar la ficha", true);
    }
  }

  list.addEventListener("click", e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;

    e.preventDefault();
    e.stopPropagation();

    const action = btn.dataset.action;
    const id = btn.dataset.id;

    switch (action) {
      case "edit":
        editRecord(id);
        break;
      case "pdf":
        exportSavedRecord(id, "pdf").catch(error => {
          console.error(error);
          showToast(error.message || "No se pudo exportar el PDF", true);
        });
        break;
      case "png":
        exportSavedRecord(id, "png").catch(error => {
          console.error(error);
          showToast(error.message || "No se pudo exportar el PNG", true);
        });
        break;
      case "jpg":
        exportSavedRecord(id, "jpg").catch(error => {
          console.error(error);
          showToast(error.message || "No se pudo exportar el JPG", true);
        });
        break;
      case "print":
        exportSavedRecord(id, "print").catch(error => {
          console.error(error);
          showToast(error.message || "No se pudo imprimir", true);
        });
        break;
      case "delete":
        deleteSavedRecord(id);
        break;
    }
  });

  [
    search,
    filterDate,
    filterFrom,
    filterTo,
    filterCorrection,
    filterFoot,
    filterDetail,
    filterPatient,
    filterDni
  ].forEach(control => {
    control.addEventListener("input", renderRecords);
    control.addEventListener("change", renderRecords);
  });

  $("#clearFilters").addEventListener("click", () => {
    search.value = "";
    filterDate.value = "";
    filterFrom.value = "";
    filterTo.value = "";
    filterCorrection.value = "";
    filterFoot.value = "";
    filterDetail.value = "";
    filterPatient.value = "";
    filterDni.value = "";
    renderRecords();
  });

  filtersAccordionBtn.addEventListener("click", () => {
    const willOpen = !filtersPanel.classList.contains("open");
    filtersPanel.classList.toggle("open", willOpen);
    filtersAccordionBtn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  });
  async function runActionButton(button, workingText, action) {
    const originalText = button.textContent;
    button.disabled = true;
    button.textContent = workingText;

    try {
      await action();
    } catch (error) {
      console.error(error);
      showToast(error.message || "No se pudo completar la acción", true);
    } finally {
      button.disabled = false;
      button.textContent = originalText;
    }
  }

  $("#printBtn").addEventListener("click", () => {
    runActionButton($("#printBtn"), "Preparando...", printCurrentSheet);
  });

  $("#pdfBtn").addEventListener("click", () => {
    runActionButton($("#pdfBtn"), "Exportando...", exportCurrentPdf);
  });

  $("#pngBtn").addEventListener("click", () => {
    runActionButton($("#pngBtn"), "Exportando...", () => exportCurrentImage("png"));
  });

  $("#jpgBtn").addEventListener("click", () => {
    runActionButton($("#jpgBtn"), "Exportando...", () => exportCurrentImage("jpg"));
  });

  $("#deleteCurrentBtn").addEventListener("click", async () => {
    if (editingRecordId) {
      showToast("Guardá nuevamente la ficha antes de poder eliminarla.", true);
      return;
    }

    const currentId = fields.id.value;

    if (currentId) {
      const currentRecord = records.find(record => record.id === currentId);
      const patientName =
        currentRecord?.patient ||
        fields.patient.value.trim() ||
        "esta ficha";

      if (!confirm(`¿Borrar la ficha de ${patientName}?`)) return;

      try {
        await deleteRecordFromFirestore(currentId);
        resetForm();
        showToast("Ficha eliminada", true);
      } catch (error) {
        console.error("Error al eliminar la ficha:", error);
        showToast("No se pudo eliminar la ficha", true);
      }

      return;
    }

    const hasContent = [
      fields.patient.value,
      fields.phone.value,
      fields.dni.value,
      fields.last.value,
      fields.material.value,
      fields.number.value,
      fields.observations.value,
      fields.orderedBy.value,
      fields.madeBy.value,
      selectedCorrections.map(item => `${item.name} ${item.foot}`).join(" ")
    ].some(value => String(value || "").trim());

    if (!hasContent) {
      showToast("No hay una ficha para borrar", true);
      return;
    }

    if (confirm("¿Limpiar la ficha actual sin guardar?")) {
      resetForm();
      showToast("Ficha limpiada", true);
    }
  });

  function switchView(viewId) {
    document.querySelectorAll(".view-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === viewId);
    });
    document.querySelectorAll(".view-tab").forEach(tab => {
      tab.classList.toggle("active", tab.dataset.view === viewId);
    });
  }

  document.querySelectorAll(".view-tab").forEach(tab => {
    tab.addEventListener("click", () => switchView(tab.dataset.view));
  });

  filtersPanel.classList.remove("open");
  filtersAccordionBtn.setAttribute("aria-expanded", "false");

  resetForm();
  renderRecords();
  listenToFirestore();

  migrateLegacyRecords().catch(error => {
    console.error("Error al migrar las fichas anteriores:", error);
    showToast("No se pudieron migrar algunas fichas anteriores", true);
  });
</script>
</body>
</html>
