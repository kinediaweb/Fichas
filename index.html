<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinedia · Orden de trabajo</title>
  <style>
    :root{
      --bg:#ffffff;
      --paper:#ffffff;
      --ink:#111111;
      --muted:#6f6f6f;
      --line:#dcdcdc;
      --soft:#f7f7f7;
      --accent:#111111;
      --danger:#8b2c2c;
      --ok:#325c42;
      --shadow:0 8px 24px rgba(0,0,0,.04);
      --radius:14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#ffffff;
      color:var(--ink);
    }

    button,input,textarea{font:inherit}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(760px, 920px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }

    .sheet{
      position:relative;
      width:100%;
      min-height:1060px;
      background:var(--paper);
      border:1.5px solid #111;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:34px 56px 92px;
      overflow:hidden;
    }

    .view-shell{
      width:100%;
    }

    .view-switch{
      grid-column:1 / -1;
      width:100%;
      margin:0;
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:20;
    }

    .switch-inner{
      display:grid;
      grid-template-columns:1fr 1fr;
      width:100%;
      gap:0;
      padding:0;
      background:#fff;
      border:0;
      border-radius:0;
      box-shadow:none;
    }

    .view-tab{
      border:0;
      background:#fff;
      color:var(--muted);
      padding:15px 20px;
      border-radius:0;
      font-weight:600;
      font-size:14px;
      letter-spacing:.01em;
      cursor:pointer;
      border-bottom:2px solid transparent;
      transition:.18s ease;
    }

    .view-tab.active{
      background:#fff;
      color:#111;
      border-bottom-color:#111;
    }

    .view-panel{
      display:none;
    }

    .view-panel.active{
      display:block;
    }

    .saved-main{
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow);
      min-height:760px;
      overflow:hidden;
    }

    .saved-main .card{
      background:#fff;
      border-radius:14px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      overflow:hidden;
    }

    .sheet-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:18px;
      gap:12px;
    }

    .sheet-title{
      font-size:30px;
      font-weight:650;
      letter-spacing:.01em;
      color:#111;
    }

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      flex:0 0 auto;
      margin-left:auto;
      min-width:84px;
      min-height:84px;
    }

    .brand-mark{
      width:84px;
      height:84px;
      display:block;
      object-fit:contain;
      border-radius:50%;
      filter:none;
      opacity:1;
      visibility:visible;
    }

    .brand-name{
      display:none;
    }

    .field-list{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .field-row{
      display:grid;
      grid-template-columns:155px 1fr;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border:1px solid transparent;
      border-radius:10px;
      transition:.18s ease;
    }

    .field-row:hover{
      background:var(--soft);
    }

    .field-row:focus-within{
      background:var(--soft);
      border-color:var(--line);
    }

    .field-label{
      font-size:14px;
      font-weight:650;
      letter-spacing:.01em;
      color:#30363a;
    }

    .field-input,
    .field-textarea{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:var(--ink);
      padding:0;
      font-size:15px;
      text-align:left;
    }

    .field-input::placeholder,
    .field-textarea::placeholder{
      color:#b0b6ba;
    }

    .field-textarea{
      min-height:110px;
      resize:vertical;
      line-height:1.5;
    }

    .section-label{
      margin:14px 0 8px;
      font-size:13px;
      font-weight:600;
      letter-spacing:0;
      color:#111;
      text-transform:none;
    }



    
    .feet-image-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      margin:4px 0 14px;
      background:#fff;
    }

    .feet-diagram{
      position:relative;
      width:100%;
      max-width:590px;
      margin:0 auto;
    }

    .feet-reference-image{
      display:block;
      width:100%;
      height:auto;
      object-fit:contain;
      background:transparent;
      margin:0 auto;
    }

    .feet-annotations{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:visible;
      pointer-events:none;
    }

    .annotation-guide{
      fill:none;
      stroke:#41c8bc;
      stroke-width:3.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .annotation-line{
      fill:none;
      stroke:#41c8bc;
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .annotation-text{
      fill:#41c8bc;
      font-size:17px;
      font-weight:700;
      letter-spacing:.01em;
      paint-order:stroke;
      stroke:#fff;
      stroke-width:6px;
      stroke-linejoin:round;
    }

    .corrections-block{
      margin-top:16px;
      margin-bottom:8px;
      padding:0;
      border-radius:12px;
      background:#fff;
    }

    .corrections-row{
      display:grid;
      grid-template-columns:155px 1fr;
      align-items:start;
      gap:8px;
      padding:7px 10px;
      border:1px solid transparent;
      border-radius:10px;
    }

    .corrections-label{
      font-size:14px;
      font-weight:650;
      letter-spacing:.01em;
      color:#30363a;
      padding-top:10px;
    }

    .multi-select{
      position:relative;
      width:100%;
    }

    .multi-trigger{
      width:100%;
      min-height:40px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--ink);
      cursor:pointer;
      text-align:left;
    }

    .multi-trigger:hover{
      background:var(--soft);
    }

    .multi-placeholder{
      color:#a5adb2;
      font-size:14px;
    }

    .multi-arrow{
      width:8px;
      height:8px;
      border-right:1.5px solid currentColor;
      border-bottom:1.5px solid currentColor;
      transform:rotate(45deg) translateY(-2px);
      flex:0 0 auto;
      color:var(--muted);
      transition:.18s ease;
    }

    .multi-select.open .multi-arrow{
      transform:rotate(225deg) translate(-1px,-1px);
    }

    .multi-menu{
      display:none;
      position:absolute;
      top:calc(100% + 6px);
      left:0;
      right:0;
      z-index:30;
      max-height:340px;
      overflow:visible;
      padding:8px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      box-shadow:0 12px 28px rgba(0,0,0,.08);
    }

    .multi-select.open .multi-menu{
      display:block;
    }

    .correction-search{
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:9px 10px;
      outline:none;
      background:var(--soft);
      font-size:13px;
      margin-bottom:7px;
    }

    .correction-search:focus{
      background:#fff;
      border-color:#bfc6ca;
    }

    .correction-options{
      max-height:235px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .correction-option{
      width:100%;
      border:0;
      background:#fff;
      color:var(--ink);
      text-align:left;
      padding:9px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      line-height:1.25;
    }

    .correction-option:hover{
      background:var(--soft);
    }

    .foot-choice{
      display:none;
      margin-top:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--soft);
    }

    .foot-choice.open{
      display:block;
    }

    .foot-choice-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .foot-choice-name{
      color:var(--ink);
      font-weight:700;
    }

    .foot-choice-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px;
    }

    .foot-choice-btn{
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 10px;
      background:#fff;
      color:var(--ink);
      font-size:12px;
      font-weight:650;
      cursor:pointer;
    }

    .foot-choice-btn:hover{
      background:#f0f2f3;
    }

    .selected-corrections{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:8px;
    }

    .selected-correction{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:6px 8px 6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--soft);
      font-size:12px;
      color:#34393d;
    }

    .correction-foot{
      color:var(--muted);
      font-weight:700;
    }

    .remove-correction{
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      border:0;
      border-radius:50%;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      padding:0;
      line-height:1;
      font-size:15px;
    }

    .remove-correction:hover{
      background:#e7e9eb;
      color:#222;
    }

    .corrections-print{
      display:none;
      font-size:13px;
      line-height:1.45;
      color:#222;
    }


    .multi-menu.choosing-foot .correction-search,
    .multi-menu.choosing-foot .correction-options{
      display:none;
    }

    .multi-menu.choosing-foot{
      max-height:none;
      overflow:visible;
    }

    .multi-menu.choosing-foot .foot-choice{
      display:block;
      margin-top:0;
    }

    .foot-choice-actions{
      grid-template-columns:1fr 1fr;
    }

    .foot-choice-cancel{
      grid-column:1 / -1;
      border:0;
      background:transparent;
      color:var(--muted);
      padding:7px;
      font-size:12px;
      cursor:pointer;
    }

    .foot-choice-cancel:hover{
      color:var(--ink);
    }

    .bottom-grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 10px;
    }

    .sheet-actions{
      position:absolute;
      left:40px;
      bottom:20px;
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
    }

    .date-corner{
      position:absolute;
      right:40px;
      bottom:24px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }

    .sidebar{
      position:sticky;
      top:28px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .card{
      background:#fff;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      background:#fff;
    }

    .card-head h2{
      margin:0;
      font-size:17px;
      font-weight:700;
    }

    .card-body{
      padding:14px;
    }

    .search{
      display:block;
      width:100%;
      min-width:0;
      min-height:41px;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      outline:none;
      font-size:13px;
    }

    .search:focus{
      border-color:#bdbdbd;
      background:#fff;
    }

    .record-list{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:none;
      overflow:auto;
      margin-top:10px;
    }

    .record{
      display:grid;
      grid-template-columns:minmax(180px,1.2fr) minmax(250px,2fr) auto;
      align-items:center;
      gap:12px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 9px;
      background:#fff;
      min-height:46px;
    }

    .record-title{
      font-size:13px;
      font-weight:700;
      margin:0;
      line-height:1.25;
    }

    .record-meta{
      font-size:11px;
      color:var(--muted);
      line-height:1.35;
      white-space:normal;
    }

    .record-actions{
      margin:0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:4px;
      flex-wrap:nowrap;
    }


    .record-actions .btn-icon{
      flex:0 0 28px;
      width:28px;
      height:28px;
    }

    .record-actions .btn-small{
      padding:5px 7px;
      font-size:10px;
      white-space:nowrap;
    }




    .saved-tools{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:10px;
      align-items:start;
      width:100%;
      margin-bottom:10px;
    }

    .saved-search-wrap{
      width:100%;
      min-width:0;
    }

    .filters-panel{
      margin-top:0;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      overflow:hidden;
      width:100%;
      min-width:0;
    }

    .filters-accordion-btn{
      width:100%;
      min-height:41px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:0;
      background:#fff;
      color:var(--ink);
      padding:11px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      text-align:left;
    }

    .filters-accordion-btn:hover{
      background:#f8f8f8;
    }

    .filters-accordion-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .filters-accordion-meta{
      font-size:11px;
      color:var(--muted);
      font-weight:500;
    }

    .filters-accordion-arrow{
      width:9px;
      height:9px;
      border-right:1.5px solid currentColor;
      border-bottom:1.5px solid currentColor;
      transform:rotate(45deg);
      transition:.18s ease;
      color:var(--muted);
      flex:0 0 auto;
      margin-right:2px;
    }

    .filters-panel.open .filters-accordion-arrow{
      transform:rotate(225deg);
      margin-top:4px;
    }

    .filters-content{
      display:none;
      padding:0 10px 10px;
      border-top:1px solid var(--line);
      background:#fff;
    }

    .filters-panel.open .filters-content{
      display:block;
    }

    .filters-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin-top:10px;
    }

    .filter-field{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .filter-field label{
      font-size:10px;
      font-weight:700;
      color:var(--muted);
      letter-spacing:.03em;
    }

    .filter-input,
    .filter-select{
      width:100%;
      height:34px;
      padding:6px 8px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      color:var(--ink);
      outline:none;
      font-size:12px;
    }

    .filter-input:focus,
    .filter-select:focus{
      border-color:#b8c0c5;
    }

    .filter-actions{
      display:flex;
      justify-content:flex-end;
      align-items:end;
      gap:6px;
    }

    .filter-summary{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-size:11px;
      color:var(--muted);
    }

    .record-detail-short{
      overflow:hidden;
      text-overflow:ellipsis;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    @media(max-width:680px){
      .saved-tools{
        grid-template-columns:1fr;
      }

      .filters-grid{
        grid-template-columns:1fr 1fr;
      }

      .record{
        grid-template-columns:1fr;
        gap:5px;
      }

      .record-actions{
        justify-content:flex-start;
      }
    }

    @media(max-width:560px){
      .filters-grid{
        grid-template-columns:1fr;
      }
    }

    .empty{
      padding:28px 14px;
      color:var(--muted);
      text-align:center;
      border:1px dashed var(--line);
      border-radius:13px;
    }

    .btn{
      border:1px solid var(--line);
      border-radius:8px;
      padding:7px 11px;
      font-weight:600;
      font-size:12px;
      cursor:pointer;
      transition:.18s ease;
      background:#fff;
      color:#111;
    }

    .btn:hover{
      background:#f4f4f4;
      transform:none;
    }

    .btn-dark{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-light{
      background:#fff;
      color:#111;
      border:1px solid var(--line);
    }

    .btn-danger{
      background:#fbecec;
      color:var(--danger);
    }

    .btn-small{
      padding:6px 9px;
      font-size:12px;
    }

    .btn-icon{
      width:32px;
      height:32px;
      padding:0;
      display:inline-grid;
      place-items:center;
    }

    .btn-icon svg{
      width:16px;
      height:16px;
      fill:currentColor;
    }

    .btn-danger-soft{
      background:#fff;
      color:#7e2b2b;
      border:1px solid var(--line);
    }

    .btn-danger-soft:hover{
      background:#faf1f1;
      color:#6a1d1d;
    }

    .status{
      font-size:12px;
      color:var(--muted);
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:var(--ok);
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      transition:.2s;
      z-index:50;
    }

    .toast.show{
      opacity:1;
      transform:none;
    }

    @media(max-width:1180px){
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
    }

    @media(max-width:760px){
      .app{padding:0 10px 10px}
      .sheet{
        padding:32px 20px 92px;
      }
      .sheet-header{
        margin-bottom:18px;
      }
      .sheet-title{
        font-size:24px;
      }
      .brand-mark{
        width:68px;
        height:68px;
      }
      .feet-diagram,
      .feet-reference-image{
        max-width:500px;
      }
      .annotation-text{
        font-size:14px;
      }
      .field-row{
        grid-template-columns:1fr;
        gap:6px;
      }
      .bottom-grid{
        grid-template-columns:1fr;
      }
      .corrections-row{
        grid-template-columns:1fr;
        gap:6px;
      }
      .corrections-label{
        padding-top:0;
      }
      .sheet-actions{
        left:20px;
        bottom:18px;
        gap:6px;
      }
      .date-corner{
        right:20px;
        bottom:22px;
      }
      .view-tab{
        padding:13px 12px;
      }
    }

    @media(max-width:560px){
      .brand-mark{
        width:48px;
        height:48px;
      }
      .brand-mark::before{
        font-size:28px;
      }
    }

    @media print{
      body{background:#fff}
      .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(720px, 900px);
      gap:18px;
      align-items:start;
      justify-content:center;
      padding:0 28px 28px;
      background:#fff;
    }
      .sidebar,.sheet-actions,.view-switch{
      position:absolute;
      left:40px;
      bottom:20px;
      display:flex;
      align-items:center;
      gap:8px;
      margin:0;
    }
      .sheet{
        box-shadow:none;
        border:1.2px solid #111;
        border-radius:0;
        width:210mm;
        min-height:297mm;
        padding:12mm 14mm 16mm;
      }
      .field-row,
      .foot-wrap{
        background:#fff!important;
        border-color:transparent!important;
      }
      .date-corner{
      position:absolute;
      right:40px;
      bottom:24px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:none;
      line-height:1;
    }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="view-switch">
    <div class="switch-inner">
      <button type="button" class="view-tab active" data-view="formView">Fichas</button>

<script>
(() => {
  const STORAGE_KEY = "kinedia_work_orders_v3";
  const $ = s => document.querySelector(s);
  const form = $("#recordForm");
  const list = $("#recordList");
  const search = $("#searchInput");
  const filterDate = $("#filterDate");
  const filterFrom = $("#filterFrom");
  const filterTo = $("#filterTo");
  const filterCorrection = $("#filterCorrection");
  const filterFoot = $("#filterFoot");
  const filterDetail = $("#filterDetail");
  const filterPatient = $("#filterPatient");
  const filterDni = $("#filterDni");
  const filteredCount = $("#filteredCount");
  const filtersPanel = $("#filtersPanel");
  const filtersAccordionBtn = $("#filtersAccordionBtn");
  const filtersAccordionMeta = $("#filtersAccordionMeta");
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let selectedCorrections = [];

  const fields = {
    id: $("#recordId"),
    date: $("#date"),
    patient: $("#patient"),
    phone: $("#phone"),
    dni: $("#dni"),
    last: $("#last"),
    material: $("#material"),
    number: $("#number"),
    observations: $("#observations"),
    orderedBy: $("#orderedBy"),
    madeBy: $("#madeBy")
  };

  function setToday() {
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
    const iso = local.toISOString().slice(0,10);
    fields.date.value = iso;
    $("#dateCorner").textContent = new Intl.DateTimeFormat("es-AR", {
      day:"2-digit",
      month:"2-digit",
      year:"numeric"
    }).format(now);
  }

  function showDate(iso) {
    if (!iso) return setToday();
    fields.date.value = iso;
    const [y,m,d] = iso.split("-");
    $("#dateCorner").textContent = `${d}/${m}/${y}`;
  }

  function saveStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }

  function showToast(message, danger=false) {
    const el = $("#toast");
    el.textContent = message;
    el.style.background = danger ? "var(--danger)" : "var(--ok)";
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 1800);
  }

  function escapeHTML(value="") {
    return String(value).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    })[c]);
  }

  function formatDate(value) {
    if (!value) return "";
    const [y,m,d] = value.split("-");
    return `${d}/${m}/${y}`;
  }



  const correctionsSelect = $("#correctionsSelect");
  const correctionsTrigger = $("#correctionsTrigger");
  const correctionsMenu = $("#correctionsMenu");
  const selectedCorrectionsEl = $("#selectedCorrections");
  const correctionsPlaceholder = $("#correctionsPlaceholder");
  const correctionsPrint = $("#correctionsPrint");
  const correctionSearch = $("#correctionSearch");
  const correctionOptions = $("#correctionOptions");
  const footChoice = $("#footChoice");
  const footChoiceName = $("#footChoiceName");
  const footChoiceCancel = $("#footChoiceCancel");

  let pendingCorrection = "";

  function normalizeCorrections(value) {
    if (!Array.isArray(value)) return [];
    return value.map(item => {
      if (typeof item === "string") {
        return { name:item, foot:"Izquierdo" };
      }
      return {
        name:String(item.name || ""),
        foot:item.foot === "Derecho" ? "Derecho" : "Izquierdo"
      };
    }).filter(item => item.name);
  }


  const feetAnnotations = $("#feetAnnotations");
  const CORRECTION_COLOR = "#41c8bc";

  const CORRECTION_ZONE_MAP = {
    "Arco blando":"arch",
    "Arco duro":"arch",
    "Arco semirrígido":"arch",
    "Arco más capa de látex de 3 mm":"arch",
    "Arco más capa de látex de 5 mm":"arch",
    "Oliva 1":"oliva",
    "Oliva 2":"oliva",
    "Oliva 3":"oliva",
    "Oliva 4":"oliva",
    "Oliva 5":"oliva",
    "Barra diagonal":"barraDiagonal",
    "Barraoliva":"barraOliva",
    "Rit":"rit",
    "Ret":"ret",
    "Contraarco":"contraarco",
    "Talonera de látex 3 mm":"talonera",
    "Talonera de látex 5 mm":"talonera",
    "Talonera de látex 8 mm":"talonera",
    "Talonera de plastazote 3 mm":"talonera",
    "Talonera Azul 4/5 mm":"talonera",
    "Descarga para espolón":"talonera"
  };

  /*
    Coordenadas trazadas directamente sobre la imagen real:
    - Pie izquierdo: x 10–360 / y 8–833
    - Pie derecho:   x 591–945 / y 8–839
  */
  const FOOT_GUIDES = {
    Izquierdo: {
      topArc: "M58 205 Q188 156 334 212",
      olive: "M138 244 Q190 212 246 238 Q263 265 248 295 Q217 325 170 325 Q134 311 124 281 Q124 257 138 244 Z",
      barra: "M56 337 Q188 311 336 336",
      contraarco: "M93 350 L93 530",
      arch: "M330 336 Q246 430 274 564",
      heel: "M78 548 Q188 545 318 548",
      rit: "M272 551 L303 735",
      ret: "M112 551 L82 735"
    },
    Derecho: {
      topArc: "M621 212 Q767 156 897 205",
      olive: "M713 238 Q769 212 821 244 Q835 257 835 281 Q825 311 789 325 Q742 325 711 295 Q696 265 713 238 Z",
      barra: "M619 336 Q767 311 899 337",
      contraarco: "M862 350 L862 530",
      arch: "M625 336 Q709 430 681 564",
      heel: "M637 548 Q767 545 877 548",
      rit: "M731 551 L700 735",
      ret: "M891 551 L921 735"
    }
  };

  const ZONE_TARGETS = {
    Izquierdo: {
      barraDiagonal:{x:200,y:206},
      oliva:{x:188,y:271},
      barraOliva:{x:189,y:333},
      arch:{x:271,y:446},
      contraarco:{x:93,y:452},
      talonera:{x:188,y:548},
      rit:{x:286,y:640},
      ret:{x:96,y:640}
    },
    Derecho: {
      barraDiagonal:{x:767,y:206},
      oliva:{x:779,y:271},
      barraOliva:{x:778,y:333},
      arch:{x:696,y:446},
      contraarco:{x:862,y:452},
      talonera:{x:767,y:548},
      rit:{x:669,y:640},
      ret:{x:859,y:640}
    }
  };

  const ZONE_LABELS = {
    Izquierdo: {
      barraDiagonal:{x:18,y:194,anchor:"start"},
      oliva:{x:448,y:246,anchor:"end"},
      barraOliva:{x:448,y:308,anchor:"end"},
      arch:{x:448,y:430,anchor:"end"},
      contraarco:{x:18,y:444,anchor:"start"},
      talonera:{x:448,y:538,anchor:"end"},
      rit:{x:448,y:666,anchor:"end"},
      ret:{x:18,y:666,anchor:"start"}
    },
    Derecho: {
      barraDiagonal:{x:507,y:194,anchor:"start"},
      oliva:{x:507,y:246,anchor:"start"},
      barraOliva:{x:507,y:308,anchor:"start"},
      arch:{x:507,y:430,anchor:"start"},
      contraarco:{x:937,y:444,anchor:"end"},
      talonera:{x:507,y:538,anchor:"start"},
      rit:{x:507,y:666,anchor:"start"},
      ret:{x:937,y:666,anchor:"end"}
    }
  };

  function wrapAnnotationLabel(text, maxChars = 19) {
    const words = String(text || "").split(" ");
    const lines = [];
    let line = "";

    words.forEach(word => {
      const candidate = line ? `${line} ${word}` : word;

      if (candidate.length > maxChars && line) {
        lines.push(line);
        line = word;
      } else {
        line = candidate;
      }
    });

    if (line) lines.push(line);
    return lines;
  }

  function buildGuidePaths(foot) {
    const guide = FOOT_GUIDES[foot];

    return `
      <path class="annotation-guide" d="${guide.topArc}"></path>
      <path class="annotation-guide" d="${guide.olive}"></path>
      <path class="annotation-guide" d="${guide.barra}"></path>
      <path class="annotation-guide" d="${guide.contraarco}"></path>
      <path class="annotation-guide" d="${guide.arch}"></path>
      <path class="annotation-guide" d="${guide.heel}"></path>
      <path class="annotation-guide" d="${guide.rit}"></path>
      <path class="annotation-guide" d="${guide.ret}"></path>
    `;
  }

  function renderFootAnnotations() {
    if (!feetAnnotations) return;

    const corrections = normalizeCorrections(selectedCorrections);

    if (!corrections.length) {
      feetAnnotations.innerHTML = "";
      return;
    }

    const correctionsByFoot = {
      Izquierdo: corrections.filter(item => item.foot === "Izquierdo"),
      Derecho: corrections.filter(item => item.foot === "Derecho")
    };

    const parts = [
      `<defs>
        <marker
          id="annotationArrow"
          markerWidth="11"
          markerHeight="11"
          refX="9"
          refY="5.5"
          orient="auto"
          markerUnits="strokeWidth"
        >
          <path d="M0,0 L11,5.5 L0,11 z" fill="${CORRECTION_COLOR}"></path>
        </marker>
      </defs>`
    ];

    if (correctionsByFoot.Izquierdo.length) {
      parts.push(buildGuidePaths("Izquierdo"));
    }

    if (correctionsByFoot.Derecho.length) {
      parts.push(buildGuidePaths("Derecho"));
    }

    ["Izquierdo", "Derecho"].forEach(foot => {
      const zoneUseCount = {};

      correctionsByFoot[foot].forEach(item => {
        const zone = CORRECTION_ZONE_MAP[item.name] || "arch";
        const target = ZONE_TARGETS[foot][zone];
        const baseLabel = ZONE_LABELS[foot][zone];

        if (!target || !baseLabel) return;

        const key = `${foot}-${zone}`;
        const stackIndex = zoneUseCount[key] || 0;
        zoneUseCount[key] = stackIndex + 1;

        const textLines = wrapAnnotationLabel(item.name);
        const labelY = baseLabel.y + stackIndex * 22;
        const lineStartX = baseLabel.anchor === "end"
          ? baseLabel.x - 10
          : baseLabel.x + 10;

        const lineStartY = labelY + ((textLines.length - 1) * 15) / 2;

        parts.push(`
          <g class="annotation-group">
            <line
              class="annotation-line"
              x1="${lineStartX}"
              y1="${lineStartY}"
              x2="${target.x}"
              y2="${target.y}"
              marker-end="url(#annotationArrow)"
            ></line>

            <text
              class="annotation-text"
              x="${baseLabel.x}"
              y="${labelY}"
              text-anchor="${baseLabel.anchor}"
            >
              ${textLines.map((line, index) => `
                <tspan
                  x="${baseLabel.x}"
                  dy="${index === 0 ? 0 : 15}"
                >${escapeHTML(line)}</tspan>
              `).join("")}
            </text>
          </g>
        `);
      });
    });

    feetAnnotations.innerHTML = parts.join("");
  }

  function renderCorrections() {
    correctionsPlaceholder.textContent = selectedCorrections.length
      ? `${selectedCorrections.length} seleccionada${selectedCorrections.length === 1 ? "" : "s"}`
      : "Buscar y seleccionar correcciones";

    selectedCorrectionsEl.innerHTML = selectedCorrections.map((item, index) => `
      <span class="selected-correction">
        <span>${escapeHTML(item.name)}</span>
        <span class="correction-foot">${item.foot === "Izquierdo" ? "Izq." : "Der."}</span>
        <button
          type="button"
          class="remove-correction"
          data-remove-correction-index="${index}"
          aria-label="Quitar ${escapeHTML(item.name)}"
        >×</button>
      </span>
    `).join("");

    correctionsPrint.textContent = selectedCorrections.length
      ? selectedCorrections.map(item =>
          `${item.name} (${item.foot === "Izquierdo" ? "Izq." : "Der."})`
        ).join(" · ")
      : "Sin correcciones seleccionadas";

    renderFootAnnotations();
  }

  function filterCorrectionOptions() {
    const query = correctionSearch.value.trim().toLowerCase();

    correctionOptions.querySelectorAll(".correction-option").forEach(button => {
      const matches = button.dataset.correction.toLowerCase().includes(query);
      button.style.display = matches ? "" : "none";
    });
  }

  function openFootChoice(correctionName) {
    pendingCorrection = correctionName;
    footChoiceName.textContent = correctionName;
    footChoice.classList.add("open");
    correctionsMenu.classList.add("choosing-foot");
  }

  correctionsTrigger.addEventListener("click", () => {
    correctionsSelect.classList.toggle("open");

    if (correctionsSelect.classList.contains("open")) {
      correctionSearch.value = "";
      filterCorrectionOptions();
      footChoice.classList.remove("open");
      correctionsMenu.classList.remove("choosing-foot");
      pendingCorrection = "";
      setTimeout(() => correctionSearch.focus(), 50);
    }
  });

  correctionSearch.addEventListener("input", filterCorrectionOptions);

  correctionOptions.addEventListener("click", e => {
    const button = e.target.closest("[data-correction]");
    if (!button) return;
    openFootChoice(button.dataset.correction);
  });

  footChoice.addEventListener("click", e => {
    const button = e.target.closest("[data-foot-choice]");
    if (!button || !pendingCorrection) return;

    const foot = button.dataset.footChoice;

    const alreadyExists = selectedCorrections.some(item =>
      item.name === pendingCorrection && item.foot === foot
    );

    if (!alreadyExists) {
      selectedCorrections.push({
        name: pendingCorrection,
        foot
      });
    }

    renderCorrections();
    footChoice.classList.remove("open");
    correctionsMenu.classList.remove("choosing-foot");
    pendingCorrection = "";
    correctionSearch.value = "";
    filterCorrectionOptions();
    correctionSearch.focus();
  });


  footChoiceCancel.addEventListener("click", () => {
    footChoice.classList.remove("open");
    correctionsMenu.classList.remove("choosing-foot");
    pendingCorrection = "";
    correctionSearch.value = "";
    filterCorrectionOptions();
    correctionSearch.focus();
  });

  selectedCorrectionsEl.addEventListener("click", e => {
    const btn = e.target.closest("[data-remove-correction-index]");
    if (!btn) return;

    const index = Number(btn.dataset.removeCorrectionIndex);
    selectedCorrections.splice(index, 1);
    renderCorrections();
  });

  document.addEventListener("click", e => {
    if (!correctionsSelect.contains(e.target)) {
      correctionsSelect.classList.remove("open");
      correctionsMenu.classList.remove("choosing-foot");
      footChoice.classList.remove("open");
      pendingCorrection = "";
    }
  });

  function resetForm() {
    form.reset();
    fields.id.value = "";
    selectedCorrections = [];
    renderCorrections();
    setToday();
  }

  function recordFromForm() {
    return {
      id: fields.id.value || crypto.randomUUID(),
      date: fields.date.value,
      patient: fields.patient.value.trim(),
      phone: fields.phone.value.trim(),
      dni: fields.dni.value.trim(),
      last: fields.last.value.trim(),
      material: fields.material.value.trim(),
      number: fields.number.value.trim(),
      observations: fields.observations.value.trim(),
      corrections: [...selectedCorrections],
      orderedBy: fields.orderedBy.value.trim(),
      madeBy: fields.madeBy.value.trim(),
      updatedAt: new Date().toISOString()
    };
  }


  function updateFiltersAccordionMeta() {
    const activeFilters = [];

    if (search.value.trim()) activeFilters.push("búsqueda");
    if (filterDate.value) activeFilters.push("fecha");
    if (filterFrom.value || filterTo.value) activeFilters.push("período");
    if (filterCorrection.value) activeFilters.push("corrección");
    if (filterFoot.value) activeFilters.push("pie");
    if (filterDetail.value.trim()) activeFilters.push("detalle");
    if (filterPatient.value.trim()) activeFilters.push("paciente");
    if (filterDni.value.trim()) activeFilters.push("DNI");

    filtersAccordionMeta.textContent = activeFilters.length
      ? `${activeFilters.length} filtro${activeFilters.length === 1 ? "" : "s"} activo${activeFilters.length === 1 ? "" : "s"}`
      : "Sin filtros activos";
  }

  function recordMatchesFilters(r) {
    const q = search.value.trim().toLowerCase();
    const exactDate = filterDate.value;
    const fromDate = filterFrom.value;
    const toDate = filterTo.value;
    const correction = filterCorrection.value;
    const foot = filterFoot.value;
    const detail = filterDetail.value.trim().toLowerCase();
    const patient = filterPatient.value.trim().toLowerCase();
    const dni = filterDni.value.trim().toLowerCase();

    const normalizedCorrections = normalizeCorrections(r.corrections);

    const generalValues = [
      r.patient,
      r.phone,
      r.dni,
      r.last,
      r.material,
      r.number,
      r.observations,
      r.orderedBy,
      r.madeBy,
      ...normalizedCorrections.flatMap(item => [item.name, item.foot])
    ].map(v => String(v || "").toLowerCase());

    if (q && !generalValues.some(value => value.includes(q))) return false;
    if (exactDate && r.date !== exactDate) return false;
    if (fromDate && (!r.date || r.date < fromDate)) return false;
    if (toDate && (!r.date || r.date > toDate)) return false;
    if (detail && !String(r.observations || "").toLowerCase().includes(detail)) return false;
    if (patient && !String(r.patient || "").toLowerCase().includes(patient)) return false;
    if (dni && !String(r.dni || "").toLowerCase().includes(dni)) return false;

    if (correction || foot) {
      const correctionMatch = normalizedCorrections.some(item => {
        const matchesCorrection = !correction || item.name === correction;
        const matchesFoot = !foot || item.foot === foot;
        return matchesCorrection && matchesFoot;
      });
      if (!correctionMatch) return false;
    }

    return true;
  }

  function renderRecords() {
    const filtered = records
      .filter(recordMatchesFilters)
      .sort((a,b) => {
        const dateCompare = String(b.date || "").localeCompare(String(a.date || ""));
        if (dateCompare !== 0) return dateCompare;
        return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
      });

    $("#recordCount").textContent = `${records.length} ${records.length === 1 ? "registro" : "registros"}`;
    filteredCount.textContent = `${filtered.length} ${filtered.length === 1 ? "resultado" : "resultados"}`;
    updateFiltersAccordionMeta();

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">${records.length ? "No hay fichas que coincidan con los filtros." : "Todavía no hay fichas guardadas."}</div>`;
      return;
    }

    list.innerHTML = filtered.map(r => {
      const corrections = normalizeCorrections(r.corrections);
      const correctionText = corrections.length
        ? corrections.map(item => `${item.name} (${item.foot === "Izquierdo" ? "Izq." : "Der."})`).join(", ")
        : "Sin correcciones";

      return `
        <article class="record">
          <div>
            <div class="record-title">${escapeHTML(r.patient || "Sin nombre")}</div>
            <div class="record-meta">
              ${formatDate(r.date)}
              ${r.dni ? ` · DNI ${escapeHTML(r.dni)}` : ""}
              ${r.number ? ` · Orden ${escapeHTML(r.number)}` : ""}
            </div>
          </div>

          <div class="record-meta">
            <div>${escapeHTML(correctionText)}</div>
            ${r.observations ? `<div class="record-detail-short">${escapeHTML(r.observations)}</div>` : ""}
          </div>

          <div class="record-actions">
            <button type="button" class="btn btn-light btn-small" data-action="edit" data-id="${r.id}">Editar</button>
            <button type="button" class="btn btn-light btn-small" data-action="pdf" data-id="${r.id}">PDF</button>
            <button type="button" class="btn btn-light btn-small" data-action="print" data-id="${r.id}">Imprimir</button>
            <button type="button" class="btn btn-icon btn-danger-soft btn-small" data-action="delete" data-id="${r.id}" aria-label="Eliminar ficha" title="Eliminar ficha">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-2 6h10l-.8 10.2A2 2 0 0 1 14.2 21H9.8a2 2 0 0 1-2-1.8L7 9Zm3 2v7h2v-7h-2Zm4 0v7h2v-7h-2Z"/>
              </svg>
            </button>
          </div>
        </article>
      `;
    }).join("");
  }

  function editRecord(id) {
    const r = records.find(x => x.id === id);
    if (!r) return;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";
    selectedCorrections = normalizeCorrections(r.corrections);
    renderCorrections();

    showDate(r.date);

    switchView("formView");
    window.scrollTo({top:0, behavior:"smooth"});
  }

  form.addEventListener("submit", e => {
    e.preventDefault();
    const record = recordFromForm();
    const idx = records.findIndex(r => r.id === record.id);

    if (idx >= 0) {
      records[idx] = record;
      showToast("Ficha actualizada");
    } else {
      records.push(record);
      showToast("Ficha guardada");
    }

    saveStorage();
    renderRecords();
    resetForm();
  });

  function loadRecordIntoForm(id) {
    const r = records.find(x => x.id === id);
    if (!r) return null;

    fields.id.value = r.id;
    fields.patient.value = r.patient || "";
    fields.phone.value = r.phone || "";
    fields.dni.value = r.dni || "";
    fields.last.value = r.last || "";
    fields.material.value = r.material || "";
    fields.number.value = r.number || "";
    fields.observations.value = r.observations || "";
    fields.orderedBy.value = r.orderedBy || "";
    fields.madeBy.value = r.madeBy || "";
    selectedCorrections = normalizeCorrections(r.corrections);
    renderCorrections();
    showDate(r.date);

    return r;
  }

  function printSavedRecord(id, exportAsPdf = false) {
    const record = loadRecordIntoForm(id);
    if (!record) return;

    switchView("formView");

    const previousTitle = document.title;
    if (exportAsPdf) {
      document.title = `Kinedia - ${record.patient || "ficha"}`;
    }

    setTimeout(() => {
      window.print();
      if (exportAsPdf) {
        setTimeout(() => {
          document.title = previousTitle;
        }, 500);
      }
    }, 120);
  }


  function deleteSavedRecord(id) {
    const record = records.find(item => item.id === id);
    if (!record) {
      showToast("No se encontró la ficha", true);
      return;
    }

    const patientName = record.patient || "este paciente";
    const confirmed = window.confirm(`¿Eliminar la ficha de ${patientName}?`);
    if (!confirmed) return;

    records = records.filter(item => item.id !== id);
    saveStorage();

    if (fields.id.value === id) {
      resetForm();
    }

    renderRecords();
    showToast("Ficha eliminada", true);
  }

  list.addEventListener("click", e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;

    e.preventDefault();
    e.stopPropagation();

    const action = btn.dataset.action;
    const id = btn.dataset.id;

    switch (action) {
      case "edit":
        editRecord(id);
        break;
      case "pdf":
        printSavedRecord(id, true);
        break;
      case "print":
        printSavedRecord(id, false);
        break;
      case "delete":
        deleteSavedRecord(id);
        break;
    }
  });

  [
    search,
    filterDate,
    filterFrom,
    filterTo,
    filterCorrection,
    filterFoot,
    filterDetail,
    filterPatient,
    filterDni
  ].forEach(control => {
    control.addEventListener("input", renderRecords);
    control.addEventListener("change", renderRecords);
  });

  $("#clearFilters").addEventListener("click", () => {
    search.value = "";
    filterDate.value = "";
    filterFrom.value = "";
    filterTo.value = "";
    filterCorrection.value = "";
    filterFoot.value = "";
    filterDetail.value = "";
    filterPatient.value = "";
    filterDni.value = "";
    renderRecords();
  });

  filtersAccordionBtn.addEventListener("click", () => {
    const willOpen = !filtersPanel.classList.contains("open");
    filtersPanel.classList.toggle("open", willOpen);
    filtersAccordionBtn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  });
$("#printBtn").addEventListener("click", () => window.print());

  $("#pdfBtn").addEventListener("click", () => {
    const previousTitle = document.title;
    const patientName = fields.patient.value.trim() || "ficha";
    document.title = `Kinedia - ${patientName}`;
    window.print();
    setTimeout(() => {
      document.title = previousTitle;
    }, 500);
  });

  $("#deleteCurrentBtn").addEventListener("click", () => {
    const currentId = fields.id.value;

    if (currentId) {
      const currentRecord = records.find(r => r.id === currentId);
      const patientName = currentRecord?.patient || fields.patient.value.trim() || "esta ficha";

      if (!confirm(`¿Borrar la ficha de ${patientName}?`)) return;

      records = records.filter(r => r.id !== currentId);
      saveStorage();
      renderRecords();
      resetForm();
      showToast("Ficha eliminada", true);
      return;
    }

    const hasContent = [
      fields.patient.value,
      fields.phone.value,
      fields.dni.value,
      fields.last.value,
      fields.material.value,
      fields.number.value,
      fields.observations.value,
      fields.orderedBy.value,
      fields.madeBy.value,
      selectedCorrections.map(item => `${item.name} ${item.foot}`).join(" ")
    ].some(value => String(value || "").trim());

    if (!hasContent) {
      showToast("No hay una ficha para borrar", true);
      return;
    }

    if (confirm("¿Limpiar la ficha actual sin guardar?")) {
      resetForm();
      showToast("Ficha limpiada", true);
    }
  });

  function switchView(viewId) {
    document.querySelectorAll(".view-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === viewId);
    });
    document.querySelectorAll(".view-tab").forEach(tab => {
      tab.classList.toggle("active", tab.dataset.view === viewId);
    });
  }

  document.querySelectorAll(".view-tab").forEach(tab => {
    tab.addEventListener("click", () => switchView(tab.dataset.view));
  });

  filtersPanel.classList.add("open");
  filtersAccordionBtn.setAttribute("aria-expanded", "true");

  resetForm();
  renderRecords();
})();
</script>
</body>
</html>
